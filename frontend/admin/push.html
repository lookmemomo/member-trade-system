<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员积分交易站 - 每日撮合推送</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f7fa; }
        .sidebar { width: 250px; min-height: 100vh; background: linear-gradient(180deg, #1e3a5f 0%, #2d5a87 100%); }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 255, 255, 0.1); }
        .sidebar-item.active { border-left: 3px solid #3b82f6; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body class="flex">
    <aside class="sidebar text-white flex flex-col">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fa fa-shield text-white text-xl"></i>
                </div>
                <div><div class="font-bold text-lg">管理后台</div><div class="text-xs text-white/60">会员积分交易站</div></div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('dashboard')"><i class="fa fa-dashboard mr-3"></i>数据概览</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('members')"><i class="fa fa-users mr-3"></i>会员管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('products')"><i class="fa fa-box mr-3"></i>产品管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('assign')"><i class="fa fa-user-plus mr-3"></i>一对一分配</div>
            <div class="sidebar-item active p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('push')"><i class="fa fa-paper-plane mr-3"></i>每日撮合推送</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('review')"><i class="fa fa-check-circle mr-3"></i>凭证审核</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('trades')"><i class="fa fa-exchange mr-3"></i>交易流水</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('config')"><i class="fa fa-cog mr-3"></i>系统配置</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('db-manager')"><i class="fa fa-database mr-3"></i>数据库管理</div>
        </nav>
        <div class="p-4 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div><div class="font-medium">管理员</div><div class="text-xs text-white/60">管理员</div></div>
                <button onclick="logout()" class="text-white/60 hover:text-white"><i class="fa fa-sign-out"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-auto">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">每日撮合推送</h1>
            </div>
        </header>

        <div class="p-6">
            <div class="bg-white rounded-xl shadow-sm p-6 max-w-2xl">
                <h2 class="font-semibold text-gray-800 mb-4 flex items-center">
                    <i class="fa fa-exchange mr-2 text-blue-500"></i>创建交易推送
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">选择卖家 <span class="text-red-500">*</span></label>
                        <select id="push-seller" class="w-full px-4 py-2 border rounded-lg" onchange="loadSellerProduct()">
                            <option value="">请选择卖家</option>
                        </select>
                        <p class="text-xs text-gray-500 mt-1">卖家必须是已持有产品的会员</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">卖家产品 <span class="text-red-500">*</span></label>
                        <select id="push-product" class="w-full px-4 py-2 border rounded-lg" disabled>
                            <option value="">请先选择卖家</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">交易价格（积分） <span class="text-red-500">*</span></label>
                        <input type="number" id="push-price" class="w-full px-4 py-2 border rounded-lg" placeholder="请输入交易价格" min="1">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">选择买家 <span class="text-red-500">*</span></label>
                        <select id="push-buyer" class="w-full px-4 py-2 border rounded-lg">
                            <option value="">请选择买家</option>
                        </select>
                        <p class="text-xs text-gray-500 mt-1">买家必须是已注册且未持有产品的会员</p>
                    </div>
                    <button onclick="submitPush()" class="btn-primary w-full py-3 text-white rounded-lg font-medium">生成推送</button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = '/api';
        let membersWithProduct = [];

        function showToast(message) { const t = document.getElementById('toast'); t.textContent = message; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function navigateTo(page) { window.location.href = `${page}.html`; }
        function getToken() { return localStorage.getItem('admin_token'); }
        function logout() { if (confirm('确定退出？')) { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = 'index.html'; } }

        async function init() {
            await fetchBuyers();
            await fetchMembersWithProduct();
        }

        async function fetchBuyers() {
            try {
                const response = await fetch(`${API_BASE}/member/list?page=1&pageSize=100`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const data = await response.json();
                if (data.code === 200) {
                    const members = data.data.members.filter(m => m.status === 1);
                    const select = document.getElementById('push-buyer');
                    select.innerHTML = '<option value="">请选择买家</option>' + members.map(m => `<option value="${m.id}">${m.nickname || m.username} (ID:${m.id})</option>`).join('');
                }
            } catch (error) { console.error('获取会员失败:', error); }
        }

        async function fetchMembersWithProduct() {
            try {
                const response = await fetch(`${API_BASE}/product/members-with-product`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const data = await response.json();
                if (data.code === 200) {
                    membersWithProduct = data.data;
                    const sellerSelect = document.getElementById('push-seller');
                    sellerSelect.innerHTML = '<option value="">请选择卖家</option>' + data.data.map(m => `<option value="${m.id}">${m.nickname || m.username} (${m.product_name})</option>`).join('');
                }
            } catch (error) { console.error('获取卖家失败:', error); }
        }

        function loadSellerProduct() {
            const sellerId = document.getElementById('push-seller').value;
            const productSelect = document.getElementById('push-product');
            
            if (!sellerId) {
                productSelect.innerHTML = '<option value="">请先选择卖家</option>';
                productSelect.disabled = true;
                return;
            }
            
            const member = membersWithProduct.find(m => m.id == sellerId);
            if (member) {
                productSelect.innerHTML = `<option value="${member.product_id}">${member.product_name}</option>`;
                productSelect.disabled = false;
            }
        }

        async function submitPush() {
            const sellerId = document.getElementById('push-seller').value;
            const productId = document.getElementById('push-product').value;
            const price = document.getElementById('push-price').value;
            const buyerId = document.getElementById('push-buyer').value;

            if (!sellerId) { showToast('请选择卖家'); return; }
            if (!productId) { showToast('请选择产品'); return; }
            if (!price || price <= 0) { showToast('请输入有效的交易价格'); return; }
            if (!buyerId) { showToast('请选择买家'); return; }
            if (sellerId == buyerId) { showToast('卖家和买家不能是同一个人'); return; }

            try {
                const response = await fetch(`${API_BASE}/trade/push`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sellerId: parseInt(sellerId), productId: parseInt(productId), price: parseInt(price), buyerId: parseInt(buyerId) })
                });
                const data = await response.json();
                
                if (data.code === 200) {
                    showToast('推送成功');
                    document.getElementById('push-price').value = '';
                    document.getElementById('push-buyer').value = '';
                    init();
                } else {
                    showToast(data.message);
                }
            } catch (error) {
                showToast('推送失败');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
