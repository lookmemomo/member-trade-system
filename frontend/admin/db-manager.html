<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员积分交易站 - 数据库管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f7fa; }
        .sidebar { width: 250px; min-height: 100vh; background: linear-gradient(180deg, #1e3a5f 0%, #2d5a87 100%); }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 255, 255, 0.1); }
        .sidebar-item.active { border-left: 3px solid #3b82f6; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .btn-warning { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; }
        .toast.show { opacity: 1; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #fff; border-radius: 12px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; }
        .table-container { overflow-x: auto; }
    </style>
</head>
<body class="flex">
    <aside class="sidebar text-white flex flex-col">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fa fa-shield text-white text-xl"></i>
                </div>
                <div><div class="font-bold text-lg">管理后台</div><div class="text-xs text-white/60">会员积分交易站</div></div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('dashboard')"><i class="fa fa-dashboard mr-3"></i>数据概览</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('members')"><i class="fa fa-users mr-3"></i>会员管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('products')"><i class="fa fa-box mr-3"></i>产品管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('assign')"><i class="fa fa-user-plus mr-3"></i>一对一分配</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('push')"><i class="fa fa-paper-plane mr-3"></i>每日撮合推送</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('review')"><i class="fa fa-check-circle mr-3"></i>凭证审核</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('trades')"><i class="fa fa-exchange mr-3"></i>交易流水</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('config')"><i class="fa fa-cog mr-3"></i>系统配置</div>
            <div class="sidebar-item active p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('db-manager')"><i class="fa fa-database mr-3"></i>数据库管理</div>
        </nav>
        <div class="p-4 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div><div class="font-medium">管理员</div><div class="text-xs text-white/60">管理员</div></div>
                <button onclick="logout()" class="text-white/60 hover:text-white"><i class="fa fa-sign-out"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-auto">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">数据库管理</h1>
                <div class="text-sm text-gray-500">⚠️ 此模块仅供管理员紧急修复数据使用，请勿随意操作</div>
            </div>
        </header>

        <div class="p-6">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="font-semibold text-gray-800 flex items-center">
                        <i class="fa fa-table mr-2 text-blue-500"></i>选择数据表
                    </h2>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6">
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 cursor-pointer hover:bg-blue-100" onclick="selectTable('users')">
                        <div class="text-2xl text-blue-600 mb-2"><i class="fa fa-user"></i></div>
                        <div class="font-medium text-blue-800">users</div>
                        <div class="text-xs text-blue-600">会员表</div>
                    </div>
                    <div class="bg-green-50 border border-green-200 rounded-lg p-4 cursor-pointer hover:bg-green-100" onclick="selectTable('virtual_products')">
                        <div class="text-2xl text-green-600 mb-2"><i class="fa fa-box"></i></div>
                        <div class="font-medium text-green-800">virtual_products</div>
                        <div class="text-xs text-green-600">虚拟产品表</div>
                    </div>
                    <div class="bg-purple-50 border border-purple-200 rounded-lg p-4 cursor-pointer hover:bg-purple-100" onclick="selectTable('trade_push')">
                        <div class="text-2xl text-purple-600 mb-2"><i class="fa fa-exchange"></i></div>
                        <div class="font-medium text-purple-800">trade_push</div>
                        <div class="text-xs text-purple-600">交易推送表</div>
                    </div>
                    <div class="bg-orange-50 border border-orange-200 rounded-lg p-4 cursor-pointer hover:bg-orange-100" onclick="selectTable('system_logs')">
                        <div class="text-2xl text-orange-600 mb-2"><i class="fa fa-file-text"></i></div>
                        <div class="font-medium text-orange-800">system_logs</div>
                        <div class="text-xs text-orange-600">系统日志表</div>
                    </div>
                    <div class="bg-pink-50 border border-pink-200 rounded-lg p-4 cursor-pointer hover:bg-pink-100" onclick="selectTable('points_log')">
                        <div class="text-2xl text-pink-600 mb-2"><i class="fa fa-coins"></i></div>
                        <div class="font-medium text-pink-800">points_log</div>
                        <div class="text-xs text-pink-600">积分流水表</div>
                    </div>
                    <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 cursor-pointer hover:bg-gray-100" onclick="selectTable('system_config')">
                        <div class="text-2xl text-gray-600 mb-2"><i class="fa fa-cog"></i></div>
                        <div class="font-medium text-gray-800">system_config</div>
                        <div class="text-xs text-gray-600">系统配置表</div>
                    </div>
                </div>

                <div id="table-content" class="hidden">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-4">
                            <button onclick="insertSingle()" class="btn-success px-4 py-2 text-white rounded-lg font-medium flex items-center">
                                <i class="fa fa-plus mr-2"></i>新增记录
                            </button>
                            <button onclick="batchInsert()" class="btn-primary px-4 py-2 text-white rounded-lg font-medium flex items-center">
                                <i class="fa fa-clone mr-2"></i>批量录入
                            </button>
                            <button onclick="batchDelete()" class="btn-danger px-4 py-2 text-white rounded-lg font-medium flex items-center">
                                <i class="fa fa-trash mr-2"></i>批量删除
                            </button>
                        </div>
                        <div class="flex items-center space-x-2">
                            <input type="text" id="search-field" placeholder="字段名" class="px-3 py-2 border rounded-lg text-sm">
                            <input type="text" id="search-value" placeholder="搜索值" class="px-3 py-2 border rounded-lg text-sm">
                            <button onclick="searchData()" class="px-3 py-2 bg-gray-100 rounded-lg text-sm">搜索</button>
                            <button onclick="clearSearch()" class="px-3 py-2 bg-gray-100 rounded-lg text-sm">重置</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table class="w-full border-collapse">
                            <thead class="bg-gray-50">
                                <tr id="table-header"></tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>

                    <div class="flex items-center justify-between mt-4">
                        <div class="text-sm text-gray-500">共 <span id="total-count">0</span> 条记录</div>
                        <div class="flex items-center space-x-2">
                            <button onclick="changePage(1)" class="px-3 py-1 border rounded">首页</button>
                            <button onclick="prevPage()" class="px-3 py-1 border rounded">上一页</button>
                            <span id="current-page" class="px-3 py-1">1</span>
                            <button onclick="nextPage()" class="px-3 py-1 border rounded">下一页</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <div id="form-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg" id="modal-title">操作</h3>
                <button onclick="closeModal('form-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <div id="form-content" class="space-y-4"></div>
            <button onclick="submitForm()" class="btn-primary w-full py-3 text-white rounded-lg font-medium mt-4">提交</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <h3 class="font-semibold text-lg mb-4">确认操作</h3>
            <p class="text-gray-600 mb-6" id="confirm-message">确定要执行此操作吗？</p>
            <div class="flex items-center justify-end space-x-3">
                <button onclick="closeModal('confirm-modal')" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700">取消</button>
                <button onclick="confirmAction()" class="btn-danger px-4 py-2 text-white rounded-lg">确认</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentTable = '';
        let columns = [];
        let currentPage = 1;
        let totalPages = 1;
        let searchField = '';
        let searchValue = '';
        let editData = null;
        let confirmCallback = null;
        let selectedIds = [];

        function showToast(message) { const t = document.getElementById('toast'); t.textContent = message; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function navigateTo(page) { window.location.href = `${page}.html`; }
        function getToken() { return localStorage.getItem('admin_token'); }
        function logout() { if (confirm('确定退出？')) { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = 'index.html'; } }
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        async function selectTable(table) {
            currentTable = table;
            currentPage = 1;
            searchField = '';
            searchValue = '';
            document.getElementById('search-field').value = '';
            document.getElementById('search-value').value = '';
            
            try {
                const [columnsRes, dataRes] = await Promise.all([
                    fetch(`${API_BASE}/db/table/${table}/columns`, { headers: { 'Authorization': `Bearer ${getToken()}` } }),
                    fetch(`${API_BASE}/db/table/${table}/data?page=1&pageSize=20`, { headers: { 'Authorization': `Bearer ${getToken()}` } })
                ]);
                
                const columnsData = await columnsRes.json();
                const dataData = await dataRes.json();
                
                if (columnsData.code === 200 && dataData.code === 200) {
                    columns = columnsData.data;
                    renderHeader();
                    renderBody(dataData.data.list);
                    totalPages = Math.ceil(dataData.data.total / 20);
                    document.getElementById('total-count').textContent = dataData.data.total;
                    document.getElementById('table-content').classList.remove('hidden');
                }
            } catch (error) {
                showToast('获取数据失败');
            }
        }

        function renderHeader() {
            const header = document.getElementById('table-header');
            header.innerHTML = `<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase w-8"><input type="checkbox" onchange="toggleSelectAll(this)"></th>` +
                columns.map(col => `<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">${col.name}</th>`).join('') +
                `<th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>`;
        }

        function renderBody(data) {
            const tbody = document.getElementById('table-body');
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${columns.length + 2}" class="px-6 py-8 text-center text-gray-500">暂无数据</td></tr>`;
                return;
            }
            
            tbody.innerHTML = data.map(row => `
                <tr>
                    <td class="px-4 py-3">
                        <input type="checkbox" value="${row.id}" onchange="toggleSelect(this)" ${selectedIds.includes(row.id) ? 'checked' : ''}>
                    </td>
                    ${columns.map(col => `<td class="px-4 py-3 text-sm text-gray-900">${renderValue(row[col.name], col.type)}</td>`).join('')}
                    <td class="px-4 py-3">
                        <button onclick="editSingle(${row.id})" class="text-blue-600 hover:text-blue-800 mr-2" title="编辑"><i class="fa fa-edit"></i></button>
                        <button onclick="deleteSingle(${row.id})" class="text-red-600 hover:text-red-800" title="删除"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderValue(value, type) {
            if (value === null || value === undefined) return '-';
            if (type === 'datetime' || type === 'timestamp') {
                return new Date(value).toLocaleString('zh-CN');
            }
            return value;
        }

        function toggleSelectAll(checkbox) {
            const checkboxes = document.querySelectorAll('#table-body input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.checked = checkbox.checked;
                if (checkbox.checked) {
                    if (!selectedIds.includes(parseInt(cb.value))) selectedIds.push(parseInt(cb.value));
                } else {
                    selectedIds = selectedIds.filter(id => id !== parseInt(cb.value));
                }
            });
        }

        function toggleSelect(checkbox) {
            const id = parseInt(checkbox.value);
            if (checkbox.checked) {
                if (!selectedIds.includes(id)) selectedIds.push(id);
            } else {
                selectedIds = selectedIds.filter(i => i !== id);
            }
        }

        async function searchData() {
            searchField = document.getElementById('search-field').value;
            searchValue = document.getElementById('search-value').value;
            currentPage = 1;
            await loadData();
        }

        function clearSearch() {
            searchField = '';
            searchValue = '';
            document.getElementById('search-field').value = '';
            document.getElementById('search-value').value = '';
            currentPage = 1;
            loadData();
        }

        async function loadData() {
            let url = `${API_BASE}/db/table/${currentTable}/data?page=${currentPage}&pageSize=20`;
            if (searchField && searchValue) {
                url += `&where=${encodeURIComponent(JSON.stringify({ [searchField]: searchValue }))}`;
            }
            
            try {
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const data = await response.json();
                if (data.code === 200) {
                    renderBody(data.data.list);
                    totalPages = Math.ceil(data.data.total / 20);
                    document.getElementById('total-count').textContent = data.data.total;
                }
            } catch (error) {
                showToast('获取数据失败');
            }
        }

        function changePage(page) {
            if (page >= 1 && page <= totalPages) { currentPage = page; loadData(); }
        }

        function prevPage() { changePage(currentPage - 1); }
        function nextPage() { changePage(currentPage + 1); }

        async function insertSingle() {
            editData = null;
            document.getElementById('modal-title').textContent = `新增 ${currentTable} 记录`;
            document.getElementById('form-content').innerHTML = columns.map(col => {
                if (col.name === 'id') return '';
                return `
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">${col.name} ${col.notnull ? '<span class="text-red-500">*</span>' : ''}</label>
                        ${col.type === 'integer' || col.type === 'int' ? 
                            `<input type="number" name="${col.name}" class="w-full px-4 py-2 border rounded-lg" placeholder="${col.dflt_value || ''}">` :
                            col.type === 'text' || col.type === 'varchar' ?
                            `<textarea name="${col.name}" class="w-full px-4 py-2 border rounded-lg" rows="3" placeholder="${col.dflt_value || ''}"></textarea>` :
                            `<input type="text" name="${col.name}" class="w-full px-4 py-2 border rounded-lg" placeholder="${col.dflt_value || ''}">`
                        }
                    </div>
                `;
            }).join('');
            openModal('form-modal');
        }

        async function editSingle(id) {
            try {
                const response = await fetch(`${API_BASE}/db/table/${currentTable}/data/${id}`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const data = await response.json();
                if (data.code === 200) {
                    editData = data.data;
                    document.getElementById('modal-title').textContent = `编辑 ${currentTable} 记录`;
                    document.getElementById('form-content').innerHTML = columns.map(col => {
                        if (col.name === 'id') return `<input type="hidden" name="id" value="${data.data.id}">`;
                        return `
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">${col.name}</label>
                                ${col.type === 'integer' || col.type === 'int' ? 
                                    `<input type="number" name="${col.name}" class="w-full px-4 py-2 border rounded-lg" value="${data.data[col.name] || ''}">` :
                                    col.type === 'text' || col.type === 'varchar' ?
                                    `<textarea name="${col.name}" class="w-full px-4 py-2 border rounded-lg" rows="3">${data.data[col.name] || ''}</textarea>` :
                                    `<input type="text" name="${col.name}" class="w-full px-4 py-2 border rounded-lg" value="${data.data[col.name] || ''}">`
                                }
                            </div>
                        `;
                    }).join('');
                    openModal('form-modal');
                }
            } catch (error) {
                showToast('获取数据失败');
            }
        }

        async function submitForm() {
            const form = document.getElementById('form-content');
            const inputs = form.querySelectorAll('input, textarea');
            const data = {};
            
            inputs.forEach(input => {
                const name = input.getAttribute('name');
                let value = input.value;
                
                const col = columns.find(c => c.name === name);
                if (col && (col.type === 'integer' || col.type === 'int' || col.type === 'bigint')) {
                    if (value === '' || value === null) {
                        value = null;
                    } else {
                        value = parseInt(value) || null;
                    }
                }
                
                data[name] = value;
            });

            try {
                let response;
                if (editData) {
                    response = await fetch(`${API_BASE}/db/table/${currentTable}/data/${editData.id}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    response = await fetch(`${API_BASE}/db/table/${currentTable}/insert`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }
                
                const result = await response.json();
                if (result.code === 200) {
                    showToast(editData ? '更新成功' : '插入成功');
                    closeModal('form-modal');
                    loadData();
                } else {
                    showToast(result.message);
                }
            } catch (error) {
                showToast('操作失败');
            }
        }

        function deleteSingle(id) {
            document.getElementById('confirm-message').textContent = `确定要删除ID为 ${id} 的记录吗？`;
            confirmCallback = async () => {
                try {
                    const response = await fetch(`${API_BASE}/db/table/${currentTable}/data/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${getToken()}` }
                    });
                    const result = await response.json();
                    if (result.code === 200) {
                        showToast('删除成功');
                        loadData();
                    } else {
                        showToast(result.message);
                    }
                } catch (error) {
                    showToast('删除失败');
                }
            };
            openModal('confirm-modal');
        }

        function batchDelete() {
            if (selectedIds.length === 0) {
                showToast('请先选择要删除的记录');
                return;
            }
            
            document.getElementById('confirm-message').textContent = `确定要删除选中的 ${selectedIds.length} 条记录吗？`;
            confirmCallback = async () => {
                try {
                    const response = await fetch(`${API_BASE}/db/table/${currentTable}/batch-delete`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ids: selectedIds })
                    });
                    const result = await response.json();
                    if (result.code === 200) {
                        showToast('批量删除成功');
                        selectedIds = [];
                        loadData();
                    } else {
                        showToast(result.message);
                    }
                } catch (error) {
                    showToast('批量删除失败');
                }
            };
            openModal('confirm-modal');
        }

        function batchInsert() {
            document.getElementById('modal-title').textContent = `批量录入 ${currentTable} 记录`;
            document.getElementById('form-content').innerHTML = `
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">JSON格式数据</label>
                    <textarea id="batch-json" class="w-full px-4 py-2 border rounded-lg font-mono text-sm" rows="10" placeholder='[{"字段1": "值1", "字段2": "值2"}, {"字段1": "值3", "字段2": "值4"}]'></textarea>
                </div>
                <div class="text-xs text-gray-500">请输入JSON数组格式，每个对象代表一条记录，键名为字段名</div>
            `;
            
            const originalSubmit = window.submitForm;
            window.submitForm = async () => {
                const jsonText = document.getElementById('batch-json').value;
                try {
                    const records = JSON.parse(jsonText);
                    const response = await fetch(`${API_BASE}/db/table/${currentTable}/batch-insert`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(records)
                    });
                    const result = await response.json();
                    if (result.code === 200) {
                        showToast(`成功插入 ${result.data.count} 条记录`);
                        closeModal('form-modal');
                        loadData();
                    } else {
                        showToast(result.message);
                    }
                } catch (error) {
                    showToast('JSON格式错误');
                }
                window.submitForm = originalSubmit;
            };
            
            openModal('form-modal');
        }

        function confirmAction() {
            if (confirmCallback) confirmCallback();
            closeModal('confirm-modal');
        }
    </script>
</body>
</html>
