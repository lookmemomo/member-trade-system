<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员积分交易站 - 一对一分配</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f7fa; }
        .sidebar { width: 250px; min-height: 100vh; background: linear-gradient(180deg, #1e3a5f 0%, #2d5a87 100%); }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 255, 255, 0.1); }
        .sidebar-item.active { border-left: 3px solid #3b82f6; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .btn-secondary { background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; }
        .toast.show { opacity: 1; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #fff; border-radius: 12px; width: 90%; max-width: 400px; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 500; }
        .status-input { background: #fef3c7; color: #d97706; }
        .status-temp { background: #dbeafe; color: #2563eb; }
        .status-saved { background: #dcfce7; color: #16a34a; }
    </style>
</head>
<body class="flex">
    <aside class="sidebar text-white flex flex-col">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fa fa-shield text-white text-xl"></i>
                </div>
                <div><div class="font-bold text-lg">管理后台</div><div class="text-xs text-white/60">会员积分交易站</div></div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('dashboard')"><i class="fa fa-dashboard mr-3"></i>数据概览</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('members')"><i class="fa fa-users mr-3"></i>会员管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('products')"><i class="fa fa-box mr-3"></i>产品管理</div>
            <div class="sidebar-item active p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('assign')"><i class="fa fa-user-plus mr-3"></i>一对一分配</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('push')"><i class="fa fa-paper-plane mr-3"></i>每日撮合推送</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('review')"><i class="fa fa-check-circle mr-3"></i>凭证审核</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('trades')"><i class="fa fa-exchange mr-3"></i>交易流水</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('config')"><i class="fa fa-cog mr-3"></i>系统配置</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('db-manager')"><i class="fa fa-database mr-3"></i>数据库管理</div>
        </nav>
        <div class="p-4 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div><div class="font-medium">管理员</div><div class="text-xs text-white/60">管理员</div></div>
                <button onclick="logout()" class="text-white/60 hover:text-white"><i class="fa fa-sign-out"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-auto">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">一对一分配</h1>
            </div>
        </header>

        <div class="p-6">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="font-semibold text-gray-800 flex items-center">
                        <i class="fa fa-user-plus mr-2 text-blue-500"></i>批量分配产品给会员
                    </h2>
                    <div class="flex items-center space-x-3">
                        <span class="status-badge status-input" id="table-status">录入</span>
                    </div>
                </div>

                <div class="flex items-center space-x-3 mb-4">
                    <button onclick="handleStash()" id="btn-stash" class="btn-secondary px-4 py-2 text-white rounded-lg font-medium flex items-center">
                        <i class="fa fa-save mr-2"></i>暂存
                    </button>
                    <button onclick="handleSave()" id="btn-save" class="btn-success px-4 py-2 text-white rounded-lg font-medium flex items-center" disabled>
                        <i class="fa fa-database mr-2"></i>存入
                    </button>
                    <button onclick="handleRefresh()" id="btn-refresh" class="btn-primary px-4 py-2 text-white rounded-lg font-medium flex items-center">
                        <i class="fa fa-refresh mr-2"></i>刷新
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full border-collapse" id="assign-table">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="border border-gray-200 px-4 py-3 text-left text-sm font-medium text-gray-700">会员手机号</th>
                                <th class="border border-gray-200 px-4 py-3 text-left text-sm font-medium text-gray-700">选择产品</th>
                                <th class="border border-gray-200 px-4 py-3 text-left text-sm font-medium text-gray-700">用户名</th>
                                <th class="border border-gray-200 px-4 py-3 text-left text-sm font-medium text-gray-700">会员ID</th>
                            </tr>
                        </thead>
                        <tbody id="assign-table-body">
                        </tbody>
                    </table>
                </div>

                <div class="flex items-center justify-between mt-4">
                    <div class="text-sm text-gray-500">共 <span id="row-count">0</span> 行</div>
                    <div class="flex items-center space-x-3">
                        <button onclick="addRow()" id="btn-add-row" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 flex items-center">
                            <i class="fa fa-plus mr-2"></i>增加行
                        </button>
                        <button onclick="removeRow()" id="btn-remove-row" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 flex items-center">
                            <i class="fa fa-minus mr-2"></i>减少行
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <h3 class="font-semibold text-lg mb-4" id="modal-title">确认操作</h3>
            <p class="text-gray-600 mb-6" id="modal-message">确定要执行此操作吗？</p>
            <div class="flex items-center justify-end space-x-3">
                <button onclick="closeModal('confirm-modal')" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700" id="modal-cancel-btn">取消</button>
                <button onclick="confirmModalAction()" class="btn-primary px-4 py-2 text-white rounded-lg" id="modal-confirm-btn">确认</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const TABLE_ROWS_KEY = 'assign_table_rows';
        const TABLE_STATUS_KEY = 'assign_table_status';
        
        let rows = [];
        let tableStatus = 'input';
        let members = [];
        let products = [];
        let confirmCallback = null;

        function showToast(message) {
            const t = document.getElementById('toast');
            t.textContent = message;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function navigateTo(page) {
            if (tableStatus !== 'saved') {
                showConfirmModal('数据未存入，是否继续退出？', '数据未存入，是否继续退出？', '继续', '取消', () => {
                    window.location.href = `${page}.html`;
                });
                return;
            }
            window.location.href = `${page}.html`;
        }

        function getToken() {
            return localStorage.getItem('admin_token');
        }

        function logout() {
            if (confirm('确定退出？')) {
                localStorage.removeItem('admin_token');
                localStorage.removeItem('admin_user');
                localStorage.removeItem(TABLE_ROWS_KEY);
                localStorage.removeItem(TABLE_STATUS_KEY);
                window.location.href = 'index.html';
            }
        }

        function openModal(id) {
            document.getElementById(id).classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function showConfirmModal(title, message, confirmText, cancelText, callback) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal-confirm-btn').textContent = confirmText || '确认';
            document.getElementById('modal-cancel-btn').textContent = cancelText || '取消';
            confirmCallback = callback;
            openModal('confirm-modal');
        }

        function confirmModalAction() {
            if (confirmCallback) {
                confirmCallback();
            }
            closeModal('confirm-modal');
        }

        async function init() {
            await fetchMembers();
            await fetchProducts();
            loadTableData();
            updateUI();
        }

        async function fetchMembers() {
            try {
                const response = await fetch(`${API_BASE}/member/list?page=1&pageSize=200`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const data = await response.json();
                if (data.code === 200) {
                    members = data.data.members.filter(m => m.status === 1);
                }
            } catch (error) {
                console.error('获取会员失败:', error);
            }
        }

        async function fetchProducts() {
            try {
                const response = await fetch(`${API_BASE}/product/unassigned`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const data = await response.json();
                if (data.code === 200) {
                    products = data.data;
                }
            } catch (error) {
                console.error('获取产品失败:', error);
            }
        }

        function loadTableData() {
            const savedRows = localStorage.getItem(TABLE_ROWS_KEY);
            const savedStatus = localStorage.getItem(TABLE_STATUS_KEY);

            if (savedStatus && savedStatus === 'saved') {
                tableStatus = 'saved';
                rows = [];
            } else if (savedRows && savedStatus === 'temp') {
                tableStatus = 'temp';
                rows = JSON.parse(savedRows);
            } else {
                tableStatus = 'input';
                rows = Array(5).fill(null).map(() => ({ mobile: '', productId: '', username: '', memberId: '' }));
            }
        }

        function renderTable() {
            const tbody = document.getElementById('assign-table-body');
            tbody.innerHTML = '';

            rows.forEach((row, index) => {
                const memberSelect = buildMemberSelect(index, row.mobile);
                const productSelect = buildProductSelect(index, row.productId);
                
                tbody.innerHTML += `
                    <tr>
                        <td class="border border-gray-200 px-4 py-3">
                            ${memberSelect}
                        </td>
                        <td class="border border-gray-200 px-4 py-3">
                            ${productSelect}
                        </td>
                        <td class="border border-gray-200 px-4 py-3">
                            <span class="text-gray-800">${row.username || '-'}</span>
                        </td>
                        <td class="border border-gray-200 px-4 py-3">
                            <span class="text-gray-800">${row.memberId || '-'}</span>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('row-count').textContent = rows.length;
        }

        function buildMemberSelect(index, selectedMobile) {
            const disabled = tableStatus === 'saved' ? 'disabled' : '';
            const options = ['<option value="">请选择手机号</option>'].concat(
                members.map(m => `<option value="${m.mobile}" ${m.mobile === selectedMobile ? 'selected' : ''}>${m.mobile}</option>`)
            ).join('');
            return `<select id="member-${index}" class="w-full px-3 py-2 border rounded-lg ${disabled ? 'bg-gray-100' : ''}" onchange="handleMemberChange(${index})" ${disabled}>` + options + '</select>';
        }

        function buildProductSelect(index, selectedProductId) {
            const disabled = tableStatus === 'saved' ? 'disabled' : '';
            const options = ['<option value="">请选择产品</option>'].concat(
                products.map(p => `<option value="${p.id}" ${parseInt(p.id) === parseInt(selectedProductId) ? 'selected' : ''}>${p.name}</option>`)
            ).join('');
            return `<select id="product-${index}" class="w-full px-3 py-2 border rounded-lg ${disabled ? 'bg-gray-100' : ''}" onchange="handleProductChange(${index})" ${disabled}>` + options + '</select>';
        }

        function handleMemberChange(index) {
            const mobile = document.getElementById(`member-${index}`).value;
            rows[index].mobile = mobile;

            if (mobile) {
                const member = members.find(m => m.mobile === mobile);
                if (member) {
                    rows[index].username = member.nickname || member.username;
                    rows[index].memberId = member.id;
                } else {
                    rows[index].username = '';
                    rows[index].memberId = '';
                }
            } else {
                rows[index].username = '';
                rows[index].memberId = '';
            }

            if (tableStatus === 'temp') {
                saveTempData();
            }
            renderTable();
        }

        function handleProductChange(index) {
            rows[index].productId = document.getElementById(`product-${index}`).value;
            if (tableStatus === 'temp') {
                saveTempData();
            }
        }

        function addRow() {
            if (tableStatus === 'saved') return;
            rows.push({ mobile: '', productId: '', username: '', memberId: '' });
            renderTable();
            updateUI();
        }

        function removeRow() {
            if (tableStatus === 'saved') return;
            if (rows.length > 1) {
                rows.pop();
                renderTable();
                updateUI();
            }
        }

        function validateData() {
            const mobileSet = new Set();
            const productSet = new Set();

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                
                if (!row.mobile || !row.productId) {
                    return { valid: false, message: `第${i + 1}行数据未填满` };
                }
                
                if (mobileSet.has(row.mobile)) {
                    return { valid: false, message: `会员手机号重复: ${row.mobile}` };
                }
                mobileSet.add(row.mobile);
                
                if (productSet.has(row.productId)) {
                    return { valid: false, message: `产品重复，请检查第${i + 1}行` };
                }
                productSet.add(row.productId);
            }

            return { valid: true, message: '数据正常可暂存' };
        }

        function handleStash() {
            const result = validateData();
            if (!result.valid) {
                showToast(result.message);
                return;
            }

            showToast(result.message);
            tableStatus = 'temp';
            saveTempData();
            updateUI();
        }

        function saveTempData() {
            localStorage.setItem(TABLE_ROWS_KEY, JSON.stringify(rows));
            localStorage.setItem(TABLE_STATUS_KEY, tableStatus);
        }

        async function handleSave() {
            if (tableStatus !== 'temp') {
                showToast('请先暂存数据');
                return;
            }

            showConfirmModal('存入确认', '存入后无法修改，确定要存入吗？', '确认', '取消', async () => {
                try {
                    for (const row of rows) {
                        const response = await fetch(`${API_BASE}/member/${row.memberId}/bind-product`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ productId: parseInt(row.productId) })
                        });
                        const data = await response.json();
                        if (data.code !== 200) {
                            showToast(`分配失败: ${data.message}`);
                            return;
                        }
                    }

                    showToast('全部分配成功');
                    tableStatus = 'saved';
                    localStorage.removeItem(TABLE_ROWS_KEY);
                    localStorage.setItem(TABLE_STATUS_KEY, 'saved');
                    updateUI();
                    await fetchProducts();
                    await fetchMembers();
                    renderTable();
                } catch (error) {
                    showToast('分配失败');
                }
            });
        }

        function handleRefresh() {
            if (tableStatus === 'saved') {
                resetTable();
                return;
            }

            showConfirmModal('刷新确认', '数据未暂存，会丢失！确定要刷新吗？', '确定', '取消', () => {
                resetTable();
            });
        }

        function resetTable() {
            rows = Array(5).fill(null).map(() => ({ mobile: '', productId: '', username: '', memberId: '' }));
            tableStatus = 'input';
            localStorage.removeItem(TABLE_ROWS_KEY);
            localStorage.removeItem(TABLE_STATUS_KEY);
            renderTable();
            updateUI();
        }

        function updateUI() {
            const statusBadge = document.getElementById('table-status');
            const btnStash = document.getElementById('btn-stash');
            const btnSave = document.getElementById('btn-save');
            const btnRefresh = document.getElementById('btn-refresh');
            const btnAddRow = document.getElementById('btn-add-row');
            const btnRemoveRow = document.getElementById('btn-remove-row');

            statusBadge.className = 'status-badge ' + (tableStatus === 'input' ? 'status-input' : tableStatus === 'temp' ? 'status-temp' : 'status-saved');
            statusBadge.textContent = tableStatus === 'input' ? '录入' : tableStatus === 'temp' ? '暂存' : '已存入';

            btnStash.disabled = tableStatus === 'saved';
            btnSave.disabled = tableStatus !== 'temp';
            btnAddRow.disabled = tableStatus === 'saved';
            btnRemoveRow.disabled = tableStatus === 'saved' || rows.length <= 1;

            if (tableStatus === 'saved') {
                btnStash.classList.add('opacity-50', 'cursor-not-allowed');
                btnSave.classList.add('opacity-50', 'cursor-not-allowed');
                btnAddRow.classList.add('opacity-50', 'cursor-not-allowed');
                btnRemoveRow.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                btnStash.classList.remove('opacity-50', 'cursor-not-allowed');
                btnSave.classList.remove('opacity-50', 'cursor-not-allowed');
                btnAddRow.classList.remove('opacity-50', 'cursor-not-allowed');
                btnRemoveRow.classList.remove('opacity-50', 'cursor-not-allowed');
            }

            renderTable();
        }

        window.addEventListener('beforeunload', (e) => {
            if (tableStatus !== 'saved') {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
