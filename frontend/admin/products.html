<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员积分交易站 - 产品管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f7fa; }
        .sidebar { width: 250px; min-height: 100vh; background: linear-gradient(180deg, #1e3a5f 0%, #2d5a87 100%); }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 255, 255, 0.1); }
        .sidebar-item.active { border-left: 3px solid #3b82f6; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; }
        .toast.show { opacity: 1; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #fff; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body class="flex">
    <aside class="sidebar text-white flex flex-col">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fa fa-shield text-white text-xl"></i>
                </div>
                <div><div class="font-bold text-lg">管理后台</div><div class="text-xs text-white/60">会员积分交易站</div></div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('dashboard')"><i class="fa fa-dashboard mr-3"></i>数据概览</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('members')"><i class="fa fa-users mr-3"></i>会员管理</div>
            <div class="sidebar-item active p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('products')"><i class="fa fa-box mr-3"></i>产品管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('assign')"><i class="fa fa-user-plus mr-3"></i>一对一分配</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('push')"><i class="fa fa-paper-plane mr-3"></i>每日撮合推送</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('review')"><i class="fa fa-check-circle mr-3"></i>凭证审核</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('trades')"><i class="fa fa-exchange mr-3"></i>交易流水</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('config')"><i class="fa fa-cog mr-3"></i>系统配置</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('db-manager')"><i class="fa fa-database mr-3"></i>数据库管理</div>
        </nav>
        <div class="p-4 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div><div class="font-medium">管理员</div><div class="text-xs text-white/60">管理员</div></div>
                <button onclick="logout()" class="text-white/60 hover:text-white"><i class="fa fa-sign-out"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-auto">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">产品管理</h1>
                <div class="flex items-center space-x-4">
                    <button onclick="openAddModal()" class="btn-primary px-4 py-2 text-white rounded-lg font-medium"><i class="fa fa-plus mr-2"></i>新增产品</button>
                    <button onclick="openBatchModal()" class="px-4 py-2 border border-gray-300 rounded-lg font-medium"><i class="fa fa-clone mr-2"></i>批量新增</button>
                </div>
            </div>
        </header>

        <div class="p-6">
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">名称</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">描述</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">所有者</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">电话号码</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody id="product-body" class="divide-y divide-gray-100">
                        <tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>
    <div id="add-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">新增产品</h3>
                <button onclick="closeModal('add-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">产品名称</label>
                    <input type="text" id="product-name" class="w-full px-4 py-2 border rounded-lg" placeholder="请输入产品名称">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">产品描述</label>
                    <textarea id="product-desc" class="w-full px-4 py-2 border rounded-lg" placeholder="请输入产品描述"></textarea>
                </div>
                <button onclick="submitAdd()" class="btn-primary w-full py-3 text-white rounded-lg font-medium">确认新增</button>
            </div>
        </div>
    </div>
    <div id="batch-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">批量新增产品</h3>
                <button onclick="closeModal('batch-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">产品数量</label>
                    <input type="number" id="batch-count" class="w-full px-4 py-2 border rounded-lg" placeholder="请输入批量新增数量" value="10">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">产品名称前缀</label>
                    <input type="text" id="batch-prefix" class="w-full px-4 py-2 border rounded-lg" placeholder="例如：虚拟产品" value="虚拟产品">
                </div>
                <button onclick="submitBatch()" class="btn-primary w-full py-3 text-white rounded-lg font-medium">确认批量新增</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function showToast(message) { const t = document.getElementById('toast'); t.textContent = message; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function navigateTo(page) { window.location.href = `${page}.html`; }
        function getToken() { return localStorage.getItem('admin_token'); }
        function logout() { if (confirm('确定退出？')) { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = 'index.html'; } }
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function getStatusText(status) { const texts = ['未分配', '持有中', '冻结中']; return texts[status] || '未知'; }
        function getStatusClass(status) { const classes = ['text-gray-600', 'text-green-600', 'text-orange-600']; return classes[status] || 'text-gray-500'; }

        async function fetchProducts() {
            try {
                const response = await fetch(`${API_BASE}/product/list?page=1&pageSize=50`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const data = await response.json();
                if (data.code === 200) { renderProducts(data.data.products); }
            } catch (error) { console.error('获取产品失败:', error); }
        }

        function renderProducts(products) {
            const tbody = document.getElementById('product-body');
            if (!products || products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">暂无产品</td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${p.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${p.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 max-w-xs truncate">${p.description || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${p.owner_name || '未分配'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${p.owner_mobile || '未分配'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm ${getStatusClass(p.status)}">${getStatusText(p.status)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <button onclick="showHistory(${p.id})" class="text-blue-600 hover:text-blue-800 mr-2"><i class="fa fa-history"></i></button>
                        ${p.owner_id === null ? `<button onclick="deleteProduct(${p.id})" class="text-red-600 hover:text-red-800"><i class="fa fa-trash"></i></button>` : '<span class="text-gray-300"><i class="fa fa-trash"></i></span>'}
                    </td>
                </tr>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('product-name').value = '';
            document.getElementById('product-desc').value = '';
            openModal('add-modal');
        }

        async function submitAdd() {
            const name = document.getElementById('product-name').value;
            const desc = document.getElementById('product-desc').value;
            if (!name) { showToast('请输入产品名称'); return; }

            try {
                const response = await fetch(`${API_BASE}/product/create`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description: desc })
                });
                const data = await response.json();
                if (data.code === 200) { showToast('新增成功'); closeModal('add-modal'); fetchProducts(); }
                else { showToast(data.message); }
            } catch (error) { showToast('新增失败'); }
        }

        function openBatchModal() {
            openModal('batch-modal');
        }

        async function submitBatch() {
            const count = parseInt(document.getElementById('batch-count').value);
            const prefix = document.getElementById('batch-prefix').value || '虚拟产品';
            if (!count || count <= 0) { showToast('请输入有效数量'); return; }

            const products = Array.from({ length: count }, (_, i) => ({
                name: `${prefix}${String(i + 1).padStart(4, '0')}`,
                description: `${prefix}描述`,
                image_url: null
            }));

            try {
                const response = await fetch(`${API_BASE}/product/batch`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ products })
                });
                const data = await response.json();
                if (data.code === 200) { showToast(`成功新增${data.data.count}个产品`); closeModal('batch-modal'); fetchProducts(); }
                else { showToast(data.message); }
            } catch (error) { showToast('批量新增失败'); }
        }

        async function deleteProduct(id) {
            if (!confirm('确定删除此产品？')) return;
            try {
                const response = await fetch(`${API_BASE}/product/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) { showToast('删除成功'); fetchProducts(); }
                else { showToast(data.message); }
            } catch (error) { showToast('删除失败'); }
        }

        async function showHistory(id) {
            try {
                const response = await fetch(`${API_BASE}/product/${id}/history`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const data = await response.json();
                if (data.code === 200) {
                    const history = data.data;
                    let html = history.length > 0 ? history.map(h => `
                        <div class="p-3 border-b border-gray-100">
                            <div class="flex justify-between">
                                <span>${h.seller_name} → ${h.buyer_name}</span>
                                <span class="text-blue-600">${h.price}积分</span>
                            </div>
                            <div class="text-xs text-gray-500 mt-1">${new Date(h.created_at).toLocaleString('zh-CN')} · ${['待购买', '待上传', '审核中', '已完成', '已驳回'][h.status]}</div>
                        </div>
                    `).join('') : '<div class="text-center py-4 text-gray-500">暂无流转记录</div>';
                    alert(`产品流转历史：\n${html.replace(/<[^>]+>/g, ' ')}`);
                }
            } catch (error) { console.error('获取历史失败:', error); }
        }

        document.addEventListener('DOMContentLoaded', fetchProducts);
    </script>
</body>
</html>
