<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员积分交易站 - 会员管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f7fa; }
        .sidebar { width: 250px; min-height: 100vh; background: linear-gradient(180deg, #1e3a5f 0%, #2d5a87 100%); }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 255, 255, 0.1); }
        .sidebar-item.active { border-left: 3px solid #3b82f6; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; }
        .toast.show { opacity: 1; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #fff; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body class="flex">
    <aside class="sidebar text-white flex flex-col">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fa fa-shield text-white text-xl"></i>
                </div>
                <div><div class="font-bold text-lg">管理后台</div><div class="text-xs text-white/60">会员积分交易站</div></div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('dashboard')"><i class="fa fa-dashboard mr-3"></i>数据概览</div>
            <div class="sidebar-item active p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('members')"><i class="fa fa-users mr-3"></i>会员管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('products')"><i class="fa fa-box mr-3"></i>产品管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('assign')"><i class="fa fa-user-plus mr-3"></i>一对一分配</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('push')"><i class="fa fa-paper-plane mr-3"></i>每日撮合推送</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('review')"><i class="fa fa-check-circle mr-3"></i>凭证审核</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('trades')"><i class="fa fa-exchange mr-3"></i>交易流水</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('config')"><i class="fa fa-cog mr-3"></i>系统配置</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('db-manager')"><i class="fa fa-database mr-3"></i>数据库管理</div>
        </nav>
        <div class="p-4 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div><div class="font-medium">管理员</div><div class="text-xs text-white/60">管理员</div></div>
                <button onclick="logout()" class="text-white/60 hover:text-white"><i class="fa fa-sign-out"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-auto">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">会员管理</h1>
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="keyword" placeholder="搜索会员..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>
        </header>

        <div class="p-6">
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">昵称</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">手机号</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">等级</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">推荐人</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">积分</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">奖励值</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">冻结积分</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">产品数</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                        </tr>
                    </thead>
                    <tbody id="member-body" class="divide-y divide-gray-100">
                        <tr><td colspan="8" class="px-6 py-8 text-center text-gray-500">加载中...</td></tr>
                    </tbody>
                </table>
                <div class="px-6 py-4 flex items-center justify-between border-t border-gray-100">
                    <div class="text-sm text-gray-500">共 <span id="total-count">0</span> 条记录</div>
                    <div class="flex items-center space-x-2">
                        <button onclick="changePage(1)" class="px-3 py-1 border rounded">首页</button>
                        <button onclick="prevPage()" class="px-3 py-1 border rounded">上一页</button>
                        <span id="current-page" class="px-3 py-1">1</span>
                        <button onclick="nextPage()" class="px-3 py-1 border rounded">下一页</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>
    <div id="detail-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">会员详情</h3>
                <button onclick="closeModal('detail-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <div id="member-detail" class="space-y-4"></div>
        </div>
    </div>
    <div id="points-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">调整积分</h3>
                <button onclick="closeModal('points-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <input type="hidden" id="points-member-id">
                <input type="hidden" id="points-current-value">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">当前积分</label>
                    <div class="text-lg font-bold text-gray-800" id="points-current-display">-</div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">快捷操作</label>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="setPointsAmount(10)" class="px-3 py-1 bg-green-100 text-green-700 rounded text-sm">+10</button>
                        <button onclick="setPointsAmount(50)" class="px-3 py-1 bg-green-100 text-green-700 rounded text-sm">+50</button>
                        <button onclick="setPointsAmount(100)" class="px-3 py-1 bg-green-100 text-green-700 rounded text-sm">+100</button>
                        <button onclick="setPointsAmount(500)" class="px-3 py-1 bg-green-100 text-green-700 rounded text-sm">+500</button>
                        <button onclick="setPointsAmount(-10)" class="px-3 py-1 bg-red-100 text-red-700 rounded text-sm">-10</button>
                        <button onclick="setPointsAmount(-50)" class="px-3 py-1 bg-red-100 text-red-700 rounded text-sm">-50</button>
                        <button onclick="setPointsAmount(-100)" class="px-3 py-1 bg-red-100 text-red-700 rounded text-sm">-100</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">调整金额</label>
                    <div class="flex items-center">
                        <button onclick="togglePointsSign()" class="px-3 py-2 border border-gray-300 rounded-l-lg bg-gray-50 text-gray-600">-/+</button>
                        <input type="number" id="points-amount" class="flex-1 px-4 py-2 border border-gray-300 border-l-0 rounded-r-lg focus:outline-none focus:border-blue-500" placeholder="输入调整金额" min="1">
                    </div>
                    <div class="text-sm text-gray-500 mt-1" id="points-change-preview">调整后: -</div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                    <input type="text" id="points-remark" class="w-full px-4 py-2 border rounded-lg" placeholder="操作说明">
                </div>
                <button onclick="submitPoints()" class="btn-primary w-full py-3 text-white rounded-lg font-medium">确认调整</button>
            </div>
        </div>
    </div>
    <div id="reward-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">调整奖励值</h3>
                <button onclick="closeModal('reward-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <input type="hidden" id="reward-member-id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">调整金额</label>
                    <input type="number" id="reward-amount" class="w-full px-4 py-2 border rounded-lg" placeholder="正数为增加，负数为减少">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                    <input type="text" id="reward-remark" class="w-full px-4 py-2 border rounded-lg" placeholder="操作说明">
                </div>
                <button onclick="submitReward()" class="btn-primary w-full py-3 text-white rounded-lg font-medium">确认调整</button>
            </div>
        </div>
    </div>
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">编辑会员信息</h3>
                <button onclick="closeModal('edit-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <input type="hidden" id="edit-member-id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
                    <input type="text" id="edit-nickname" class="w-full px-4 py-2 border rounded-lg" placeholder="请输入昵称">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                    <input type="tel" id="edit-mobile" class="w-full px-4 py-2 border rounded-lg" placeholder="请输入手机号" maxlength="11">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">会员等级</label>
                    <select id="edit-level" class="w-full px-4 py-2 border rounded-lg">
                        <option value="0">普通会员</option>
                        <option value="1">准店长</option>
                        <option value="2">店长</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">推荐人</label>
                    <select id="edit-referrer" class="w-full px-4 py-2 border rounded-lg">
                        <option value="">无推荐人</option>
                    </select>
                </div>
                <button onclick="submitEdit()" class="btn-primary w-full py-3 text-white rounded-lg font-medium">保存修改</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentPage = 1;
        let totalPages = 1;

        function showToast(message) { const t = document.getElementById('toast'); t.textContent = message; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function navigateTo(page) { window.location.href = `${page}.html`; }
        function getToken() { return localStorage.getItem('admin_token'); }
        function logout() { if (confirm('确定退出？')) { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = 'index.html'; } }
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function getLevelText(level) { const texts = ['普通会员', '准店长', '店长']; return texts[level] || '普通会员'; }
        function getLevelClass(level) { const classes = ['text-gray-600', 'text-blue-600', 'text-purple-600']; return classes[level] || 'text-gray-600'; }
        function getStatusText(status) { 
            const texts = ['禁用', '正常', '审核中']; 
            return texts[status] || '禁用'; 
        }
        function getStatusClass(status) { 
            const classes = ['text-red-600', 'text-green-600', 'text-yellow-600']; 
            return classes[status] || 'text-red-600'; 
        }

        async function fetchMembers() {
            const keyword = document.getElementById('keyword').value;
            try {
                const response = await fetch(`${API_BASE}/member/list?page=${currentPage}&pageSize=10&keyword=${encodeURIComponent(keyword)}`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) {
                    renderMembers(data.data.members);
                    totalPages = Math.ceil(data.data.total / 10);
                    document.getElementById('total-count').textContent = data.data.total;
                    document.getElementById('current-page').textContent = currentPage;
                }
            } catch (error) { console.error('获取会员失败:', error); }
        }

        function renderMembers(members) {
            const tbody = document.getElementById('member-body');
            if (!members || members.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="px-6 py-8 text-center text-gray-500">暂无会员</td></tr>';
                return;
            }
            tbody.innerHTML = members.map(m => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${m.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${m.nickname || m.username}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${m.mobile || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm ${getLevelClass(m.level)}">${getLevelText(m.level)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${m.referrer_name || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${m.points}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-purple-600">${m.reward_value || 0}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-orange-600">${m.frozen_points}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${m.product_count || 0}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm ${getStatusClass(m.status)}">${getStatusText(m.status)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <button onclick="showDetail(${m.id})" class="text-blue-600 hover:text-blue-800 mr-2" title="查看详情"><i class="fa fa-eye"></i></button>
                        <button onclick="openEditModal(${m.id})" class="text-yellow-600 hover:text-yellow-800 mr-2" title="编辑信息"><i class="fa fa-edit"></i></button>
                        <button onclick="openPointsModal(${m.id})" class="text-green-600 hover:text-green-800 mr-2" title="调整积分"><i class="fa fa-calculator"></i></button>
                        <button onclick="openRewardModal(${m.id})" class="text-orange-600 hover:text-orange-800 mr-2" title="调整奖励值"><i class="fa fa-trophy"></i></button>
                        ${m.status === 2 ? 
                            `<button onclick="approveMember(${m.id})" class="text-green-600 hover:text-green-800 mr-2" title="审核通过"><i class="fa fa-thumbs-up"></i></button>` : 
                            `<button onclick="toggleStatus(${m.id}, ${m.status})" class="${m.status === 1 ? 'text-red-600' : 'text-green-600'} hover:text-red-800" title="${m.status === 1 ? '禁用' : '启用'}"><i class="fa ${m.status === 1 ? 'fa-ban' : 'fa-check'}"></i></button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        function changePage(page) {
            if (page >= 1 && page <= totalPages) { currentPage = page; fetchMembers(); }
        }
        function prevPage() { changePage(currentPage - 1); }
        function nextPage() { changePage(currentPage + 1); }

        async function showDetail(id) {
            try {
                const response = await fetch(`${API_BASE}/member/${id}`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const data = await response.json();
                if (data.code === 200) {
                    const m = data.data;
                    document.getElementById('member-detail').innerHTML = `
                        <div class="grid grid-cols-2 gap-4">
                            <div><span class="text-gray-500">ID:</span> <span class="font-medium">${m.id}</span></div>
                            <div><span class="text-gray-500">用户名:</span> <span class="font-medium">${m.username}</span></div>
                            <div><span class="text-gray-500">昵称:</span> <span class="font-medium">${m.nickname || '-'}</span></div>
                            <div><span class="text-gray-500">手机号:</span> <span class="font-medium">${m.mobile || '-'}</span></div>
                            <div><span class="text-gray-500">等级:</span> <span class="font-medium ${getLevelClass(m.level)}">${getLevelText(m.level)}</span></div>
                            <div><span class="text-gray-500">推荐人:</span> <span class="font-medium">${m.referrer_name || '-'}</span></div>
                            <div><span class="text-gray-500">积分:</span> <span class="font-medium">${m.points}</span></div>
                            <div><span class="text-gray-500">冻结积分:</span> <span class="font-medium">${m.frozen_points}</span></div>
                            <div><span class="text-gray-500">奖励值:</span> <span class="font-medium">${m.reward_value}</span></div>
                            <div><span class="text-gray-500">状态:</span> <span class="font-medium ${getStatusClass(m.status)}">${getStatusText(m.status)}</span></div>
                            <div><span class="text-gray-500">注册时间:</span> <span class="font-medium">${new Date(m.created_at).toLocaleString('zh-CN')}</span></div>
                        </div>
                        ${m.qrcode_url ? `<div class="mt-4"><img src="${API_BASE}${m.qrcode_url}" class="w-32 h-32 rounded-lg"></div>` : ''}
                    `;
                    openModal('detail-modal');
                }
            } catch (error) { console.error('获取详情失败:', error); }
        }

        async function openPointsModal(id) {
            document.getElementById('points-member-id').value = id;
            document.getElementById('points-amount').value = '';
            document.getElementById('points-remark').value = '';
            
            try {
                const response = await fetch(`${API_BASE}/member/${id}`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                const data = await response.json();
                if (data.code === 200) {
                    document.getElementById('points-current-value').value = data.data.points;
                    document.getElementById('points-current-display').textContent = data.data.points;
                    updatePointsPreview();
                }
            } catch (error) { console.error('获取会员信息失败:', error); }
            
            openModal('points-modal');
        }

        function setPointsAmount(amount) {
            document.getElementById('points-amount').value = Math.abs(amount);
            document.getElementById('points-current-value').dataset.sign = amount >= 0 ? '+' : '-';
            updatePointsPreview();
        }

        function togglePointsSign() {
            const input = document.getElementById('points-amount');
            const current = parseInt(input.value) || 0;
            if (current > 0) {
                input.value = -current;
            } else {
                input.value = Math.abs(current);
            }
            updatePointsPreview();
        }

        function updatePointsPreview() {
            const current = parseInt(document.getElementById('points-current-value').value) || 0;
            const amount = parseInt(document.getElementById('points-amount').value) || 0;
            const preview = document.getElementById('points-change-preview');
            const newPoints = current + amount;
            preview.textContent = `调整后: ${newPoints}`;
            preview.className = `text-sm mt-1 ${amount >= 0 ? 'text-green-600' : 'text-red-600'}`;
        }

        async function submitPoints() {
            const id = document.getElementById('points-member-id').value;
            const amount = parseInt(document.getElementById('points-amount').value);
            const remark = document.getElementById('points-remark').value;
            if (!amount) { showToast('请输入调整金额'); return; }

            try {
                const response = await fetch(`${API_BASE}/member/${id}/adjust-points`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, description: remark })
                });
                const data = await response.json();
                if (data.code === 200) { showToast('调整成功'); closeModal('points-modal'); fetchMembers(); }
                else { showToast(data.message); }
            } catch (error) { showToast('调整失败'); }
        }

        function openRewardModal(id) {
            document.getElementById('reward-member-id').value = id;
            document.getElementById('reward-amount').value = '';
            document.getElementById('reward-remark').value = '';
            openModal('reward-modal');
        }

        async function submitReward() {
            const id = document.getElementById('reward-member-id').value;
            const amount = parseInt(document.getElementById('reward-amount').value);
            const remark = document.getElementById('reward-remark').value;
            if (!amount) { showToast('请输入调整金额'); return; }

            try {
                const response = await fetch(`${API_BASE}/member/${id}/adjust-reward`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, description: remark })
                });
                const data = await response.json();
                if (data.code === 200) { showToast('调整成功'); closeModal('reward-modal'); fetchMembers(); }
                else { showToast(data.message); }
            } catch (error) { showToast('调整失败'); }
        }

        async function openEditModal(id) {
            try {
                const [memberRes, referrerRes] = await Promise.all([
                    fetch(`${API_BASE}/member/${id}`, { headers: { 'Authorization': `Bearer ${getToken()}` } }),
                    fetch(`${API_BASE}/member/list?page=1&pageSize=100`, { headers: { 'Authorization': `Bearer ${getToken()}` } })
                ]);
                
                const memberData = await memberRes.json();
                const referrerData = await referrerRes.json();
                
                if (memberData.code === 200) {
                    const m = memberData.data;
                    document.getElementById('edit-member-id').value = m.id;
                    document.getElementById('edit-nickname').value = m.nickname || '';
                    document.getElementById('edit-mobile').value = m.mobile || '';
                    document.getElementById('edit-level').value = m.level || 0;
                    
                    const referrerSelect = document.getElementById('edit-referrer');
                    referrerSelect.innerHTML = '<option value="">无推荐人</option>';
                    if (referrerData.code === 200) {
                        referrerData.data.members.forEach(r => {
                            if (r.id !== m.id) {
                                const option = document.createElement('option');
                                option.value = r.id;
                                option.textContent = `${r.nickname || r.username} (ID: ${r.id})`;
                                if (m.referrer_id === r.id) option.selected = true;
                                referrerSelect.appendChild(option);
                            }
                        });
                    }
                    openModal('edit-modal');
                }
            } catch (error) { console.error('获取数据失败:', error); }
        }

        async function submitEdit() {
            const id = document.getElementById('edit-member-id').value;
            const nickname = document.getElementById('edit-nickname').value;
            const mobile = document.getElementById('edit-mobile').value;
            const level = parseInt(document.getElementById('edit-level').value);
            const referrerId = document.getElementById('edit-referrer').value;

            if (mobile && !/^\d{11}$/.test(mobile)) {
                showToast('请输入有效的11位手机号');
                return;
            }

            const data = {};
            if (nickname) data.nickname = nickname;
            if (mobile) data.mobile = mobile;
            data.level = level;
            data.referrer_id = referrerId ? parseInt(referrerId) : null;

            try {
                const response = await fetch(`${API_BASE}/member/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.code === 200) { showToast('保存成功'); closeModal('edit-modal'); fetchMembers(); }
                else { showToast(result.message); }
            } catch (error) { showToast('保存失败'); }
        }

        async function approveMember(id) {
            if (!confirm('确定审核通过该会员吗？')) return;
            try {
                const response = await fetch(`${API_BASE}/member/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 1 })
                });
                const data = await response.json();
                if (data.code === 200) { showToast('审核通过'); fetchMembers(); }
                else { showToast(data.message); }
            } catch (error) { showToast('操作失败'); }
        }

        async function toggleStatus(id, status) {
            try {
                const response = await fetch(`${API_BASE}/member/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: status === 1 ? 0 : 1 })
                });
                const data = await response.json();
                if (data.code === 200) { showToast(status === 1 ? '已禁用' : '已启用'); fetchMembers(); }
                else { showToast(data.message); }
            } catch (error) { showToast('操作失败'); }
        }

        document.getElementById('keyword').addEventListener('input', () => { currentPage = 1; fetchMembers(); });
        document.getElementById('points-amount').addEventListener('input', updatePointsPreview);
        document.addEventListener('DOMContentLoaded', fetchMembers);
    </script>
</body>
</html>
