<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员积分交易站 - 凭证审核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f7fa; }
        .sidebar { width: 250px; min-height: 100vh; background: linear-gradient(180deg, #1e3a5f 0%, #2d5a87 100%); }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 255, 255, 0.1); }
        .sidebar-item.active { border-left: 3px solid #3b82f6; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; }
        .toast.show { opacity: 1; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #fff; border-radius: 12px; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
        .thumbnail { cursor: pointer; object-fit: cover; }
    </style>
</head>
<body class="flex">
    <aside class="sidebar text-white flex flex-col">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fa fa-shield text-white text-xl"></i>
                </div>
                <div><div class="font-bold text-lg">管理后台</div><div class="text-xs text-white/60">会员积分交易站</div></div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('dashboard')"><i class="fa fa-dashboard mr-3"></i>数据概览</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('members')"><i class="fa fa-users mr-3"></i>会员管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('products')"><i class="fa fa-box mr-3"></i>产品管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('assign')"><i class="fa fa-user-plus mr-3"></i>一对一分配</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('push')"><i class="fa fa-paper-plane mr-3"></i>每日撮合推送</div>
            <div class="sidebar-item active p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('review')"><i class="fa fa-check-circle mr-3"></i>凭证审核</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('trades')"><i class="fa fa-exchange mr-3"></i>交易流水</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('config')"><i class="fa fa-cog mr-3"></i>系统配置</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('db-manager')"><i class="fa fa-database mr-3"></i>数据库管理</div>
        </nav>
        <div class="p-4 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div><div class="font-medium">管理员</div><div class="text-xs text-white/60">管理员</div></div>
                <button onclick="logout()" class="text-white/60 hover:text-white"><i class="fa fa-sign-out"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-auto">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">凭证审核中心</h1>
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="keyword" placeholder="搜索会员..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                    </div>
                    <select id="filter-status" class="px-4 py-2 border border-gray-300 rounded-lg" onchange="fetchReviews()">
                        <option value="2">待审核</option>
                        <option value="3">已完成</option>
                        <option value="4">已驳回</option>
                        <option value="all">全部</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="review-grid">
                <div class="text-center text-gray-500 py-12">加载中...</div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>
    <div id="image-modal" class="modal-overlay">
        <div class="modal-content p-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">凭证原图</h3>
                <button onclick="closeModal('image-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <img id="full-image" src="" class="w-full max-h-[70vh] object-contain rounded-lg">
        </div>
    </div>
    <div id="reject-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">驳回审核</h3>
                <button onclick="closeModal('reject-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <input type="hidden" id="reject-id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">驳回原因</label>
                    <textarea id="reject-reason" class="w-full px-4 py-2 border rounded-lg" rows="4" placeholder="请输入驳回原因"></textarea>
                </div>
                <div class="flex space-x-4">
                    <button onclick="closeModal('reject-modal')" class="flex-1 py-3 border border-gray-300 rounded-lg">取消</button>
                    <button onclick="submitReject()" class="flex-1 py-3 bg-red-500 text-white rounded-lg">确认驳回</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function showToast(message) { const t = document.getElementById('toast'); t.textContent = message; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function navigateTo(page) { window.location.href = `${page}.html`; }
        function getToken() { return localStorage.getItem('admin_token'); }
        function logout() { if (confirm('确定退出？')) { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = 'index.html'; } }
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function getStatusText(status) { const texts = ['待购买', '待上传', '审核中', '已完成', '已驳回']; return texts[status] || '未知'; }

        async function fetchReviews() {
            const keyword = document.getElementById('keyword').value;
            const status = document.getElementById('filter-status').value;
            try {
                const response = await fetch(`${API_BASE}/trade/review-list?page=1&pageSize=50&status=${status}&keyword=${encodeURIComponent(keyword)}`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) { renderReviews(data.data.list || data.data.trades); }
            } catch (error) { console.error('获取记录失败:', error); }
        }

        function renderReviews(trades) {
            const grid = document.getElementById('review-grid');
            if (!trades || trades.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12">暂无记录</div>';
                return;
            }
            grid.innerHTML = trades.map(t => `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div class="p-4 border-b border-gray-100">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="font-medium text-gray-800">${t.product_name}</div>
                                <div class="text-sm text-gray-500">${t.seller_name} → ${t.buyer_name}</div>
                            </div>
                            <span class="px-2 py-1 rounded-full text-xs ${getBadgeClass(t.status)}">${getStatusText(t.status)}</span>
                        </div>
                        <div class="mt-2 text-sm text-blue-600 font-medium">${t.price} 积分</div>
                    </div>
                    <div class="p-4">
                        ${t.voucher_image_url ? `
                            <div class="mb-4">
                                <div class="text-xs text-gray-500 mb-2">凭证截图</div>
                                <img src="${t.voucher_image_url}" onclick="viewImage('${t.voucher_image_url}')" class="thumbnail w-full h-40 object-cover rounded-lg">
                            </div>
                        ` : ''}
                        ${t.voucher_upload_time ? `<div class="text-xs text-gray-500">上传时间: ${new Date(t.voucher_upload_time).toLocaleString('zh-CN')}</div>` : ''}
                        ${t.review_remark ? `<div class="mt-2 text-xs text-red-600">驳回原因: ${t.review_remark}</div>` : ''}
                    </div>
                    <div class="p-4 border-t border-gray-100 flex space-x-2">
                        ${t.status === 2 ? `
                            <button onclick="reviewPass(${t.id})" class="flex-1 py-2 bg-green-500 text-white rounded-lg text-sm">审核通过</button>
                            <button onclick="openRejectModal(${t.id})" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm">驳回退回</button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function getBadgeClass(status) {
            const classes = ['bg-gray-100 text-gray-600', 'bg-orange-100 text-orange-600', 'bg-yellow-100 text-yellow-600', 'bg-green-100 text-green-600', 'bg-red-100 text-red-600'];
            return classes[status] || 'bg-gray-100 text-gray-600';
        }

        function viewImage(url) {
            document.getElementById('full-image').src = url;
            openModal('image-modal');
        }

        function openRejectModal(id) {
            document.getElementById('reject-id').value = id;
            document.getElementById('reject-reason').value = '';
            openModal('reject-modal');
        }

        async function reviewPass(id) {
            try {
                const response = await fetch(`${API_BASE}/trade/${id}/review-pass`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) { showToast('审核通过'); fetchReviews(); }
                else { showToast(data.message); }
            } catch (error) { showToast('审核失败'); }
        }

        async function submitReject() {
            const id = document.getElementById('reject-id').value;
            const reason = document.getElementById('reject-reason').value;
            if (!reason) { showToast('请输入驳回原因'); return; }

            try {
                const response = await fetch(`${API_BASE}/trade/${id}/review-reject`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ remark: reason })
                });
                const data = await response.json();
                if (data.code === 200) { showToast('已驳回'); closeModal('reject-modal'); fetchReviews(); }
                else { showToast(data.message); }
            } catch (error) { showToast('操作失败'); }
        }

        document.getElementById('keyword').addEventListener('input', fetchReviews);
        document.addEventListener('DOMContentLoaded', fetchReviews);
    </script>
</body>
</html>
