<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员积分交易站 - 交易流水</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f7fa; }
        .sidebar { width: 250px; min-height: 100vh; background: linear-gradient(180deg, #1e3a5f 0%, #2d5a87 100%); }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 255, 255, 0.1); }
        .sidebar-item.active { border-left: 3px solid #3b82f6; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body class="flex">
    <aside class="sidebar text-white flex flex-col">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fa fa-shield text-white text-xl"></i>
                </div>
                <div><div class="font-bold text-lg">管理后台</div><div class="text-xs text-white/60">会员积分交易站</div></div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('dashboard')"><i class="fa fa-dashboard mr-3"></i>数据概览</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('members')"><i class="fa fa-users mr-3"></i>会员管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('products')"><i class="fa fa-box mr-3"></i>产品管理</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('assign')"><i class="fa fa-user-plus mr-3"></i>一对一分配</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('push')"><i class="fa fa-paper-plane mr-3"></i>每日撮合推送</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('review')"><i class="fa fa-check-circle mr-3"></i>凭证审核</div>
            <div class="sidebar-item active p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('trades')"><i class="fa fa-exchange mr-3"></i>交易流水</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('config')"><i class="fa fa-cog mr-3"></i>系统配置</div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('db-manager')"><i class="fa fa-database mr-3"></i>数据库管理</div>
        </nav>
        <div class="p-4 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div><div class="font-medium">管理员</div><div class="text-xs text-white/60">管理员</div></div>
                <button onclick="logout()" class="text-white/60 hover:text-white"><i class="fa fa-sign-out"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-auto">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">交易流水</h1>
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="keyword" placeholder="搜索产品/会员..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                    </div>
                    <select id="filter-status" class="px-4 py-2 border border-gray-300 rounded-lg" onchange="fetchTrades()">
                        <option value="all">全部状态</option>
                        <option value="0">待购买</option>
                        <option value="1">待上传</option>
                        <option value="2">审核中</option>
                        <option value="3">已完成</option>
                        <option value="4">已驳回</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="p-6">
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">产品</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">卖家</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">买家</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">价格</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">推送时间</th>
                        </tr>
                    </thead>
                    <tbody id="trade-body" class="divide-y divide-gray-100">
                        <tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">加载中...</td></tr>
                    </tbody>
                </table>
                <div class="px-6 py-4 flex items-center justify-between border-t border-gray-100">
                    <div class="text-sm text-gray-500">共 <span id="total-count">0</span> 条记录</div>
                    <div class="flex items-center space-x-2">
                        <button onclick="changePage(1)" class="px-3 py-1 border rounded">首页</button>
                        <button onclick="prevPage()" class="px-3 py-1 border rounded">上一页</button>
                        <span id="current-page" class="px-3 py-1">1</span>
                        <button onclick="nextPage()" class="px-3 py-1 border rounded">下一页</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = '/api';
        let currentPage = 1;
        let totalPages = 1;

        function showToast(message) { const t = document.getElementById('toast'); t.textContent = message; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function navigateTo(page) { window.location.href = `${page}.html`; }
        function getToken() { return localStorage.getItem('admin_token'); }
        function logout() { if (confirm('确定退出？')) { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = 'index.html'; } }

        function getStatusText(status) { const texts = ['待购买', '待上传', '审核中', '已完成', '已驳回']; return texts[status] || '未知'; }
        function getStatusClass(status) { const classes = ['text-gray-600', 'text-orange-600', 'text-yellow-600', 'text-green-600', 'text-red-600']; return classes[status] || 'text-gray-500'; }

        async function fetchTrades() {
            const keyword = document.getElementById('keyword').value;
            const status = document.getElementById('filter-status').value;
            try {
                const response = await fetch(`${API_BASE}/trade/list?page=${currentPage}&pageSize=10&status=${status}&keyword=${encodeURIComponent(keyword)}`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) {
                    renderTrades(data.data.trades);
                    totalPages = Math.ceil(data.data.total / 10);
                    document.getElementById('total-count').textContent = data.data.total;
                    document.getElementById('current-page').textContent = currentPage;
                }
            } catch (error) { console.error('获取流水失败:', error); }
        }

        function renderTrades(trades) {
            const tbody = document.getElementById('trade-body');
            if (!trades || trades.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">暂无记录</td></tr>';
                return;
            }
            tbody.innerHTML = trades.map(t => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${t.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${t.product_name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${t.seller_name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${t.buyer_name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-blue-600 font-medium">${t.price}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm ${getStatusClass(t.status)}">${getStatusText(t.status)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(t.push_date).toLocaleString('zh-CN')}</td>
                </tr>
            `).join('');
        }

        function changePage(page) {
            if (page >= 1 && page <= totalPages) { currentPage = page; fetchTrades(); }
        }
        function prevPage() { changePage(currentPage - 1); }
        function nextPage() { changePage(currentPage + 1); }

        document.getElementById('keyword').addEventListener('input', () => { currentPage = 1; fetchTrades(); });
        document.addEventListener('DOMContentLoaded', fetchTrades);
    </script>
</body>
</html>
