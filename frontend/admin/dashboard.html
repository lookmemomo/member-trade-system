<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员积分交易站 - 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f7fa;
        }
        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: linear-gradient(180deg, #1e3a5f 0%, #2d5a87 100%);
        }
        .sidebar-item {
            transition: all 0.3s ease;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(255, 255, 255, 0.1);
        }
        .sidebar-item.active {
            border-left: 3px solid #3b82f6;
        }
        .stat-card {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .toast.show { opacity: 1; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="flex">
    <aside class="sidebar text-white flex flex-col">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fa fa-shield text-white text-xl"></i>
                </div>
                <div>
                    <div class="font-bold text-lg">管理后台</div>
                    <div class="text-xs text-white/60">会员积分交易站</div>
                </div>
            </div>
        </div>

        <nav class="flex-1 p-4 space-y-1">
            <div class="sidebar-item active p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('dashboard')">
                <i class="fa fa-dashboard mr-3 text-lg"></i>
                <span>数据概览</span>
            </div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('members')">
                <i class="fa fa-users mr-3 text-lg"></i>
                <span>会员管理</span>
            </div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('products')">
                <i class="fa fa-box mr-3 text-lg"></i>
                <span>产品管理</span>
            </div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('assign')">
                <i class="fa fa-user-plus mr-3 text-lg"></i>
                <span>一对一分配</span>
            </div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('push')">
                <i class="fa fa-paper-plane mr-3 text-lg"></i>
                <span>每日撮合推送</span>
            </div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('review')">
                <i class="fa fa-check-circle mr-3 text-lg"></i>
                <span>凭证审核</span>
            </div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('trades')">
                <i class="fa fa-exchange mr-3 text-lg"></i>
                <span>交易流水</span>
            </div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('config')">
                <i class="fa fa-cog mr-3 text-lg"></i>
                <span>系统配置</span>
            </div>
            <div class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center" onclick="navigateTo('db-manager')">
                <i class="fa fa-database mr-3 text-lg"></i>
                <span>数据库管理</span>
            </div>
        </nav>

        <div class="p-4 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div>
                    <div id="admin-name" class="font-medium">管理员</div>
                    <div class="text-xs text-white/60">管理员</div>
                </div>
                <button onclick="logout()" class="text-white/60 hover:text-white transition-colors">
                    <i class="fa fa-sign-out"></i>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-auto">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">数据概览</h1>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-gray-500">
                        <i class="fa fa-calendar mr-1"></i>
                        <span id="current-date"></span>
                    </div>
                </div>
            </div>
        </header>

        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="stat-card bg-white rounded-xl shadow-sm p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-sm text-gray-500 mb-1">今日推送</div>
                            <div id="stat-total" class="text-3xl font-bold text-gray-800">0</div>
                        </div>
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                            <i class="fa fa-paper-plane text-blue-600 text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="stat-card bg-white rounded-xl shadow-sm p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-sm text-gray-500 mb-1">待购买</div>
                            <div id="stat-pending-buy" class="text-3xl font-bold text-yellow-600">0</div>
                        </div>
                        <div class="w-12 h-12 bg-yellow-100 rounded-lg flex items-center justify-center">
                            <i class="fa fa-shopping-cart text-yellow-600 text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="stat-card bg-white rounded-xl shadow-sm p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-sm text-gray-500 mb-1">待审核</div>
                            <div id="stat-pending-review" class="text-3xl font-bold text-blue-600">0</div>
                        </div>
                        <div class="w-12 h-12 bg-indigo-100 rounded-lg flex items-center justify-center">
                            <i class="fa fa-clock-o text-indigo-600 text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="stat-card bg-white rounded-xl shadow-sm p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-sm text-gray-500 mb-1">已完成</div>
                            <div id="stat-completed" class="text-3xl font-bold text-green-600">0</div>
                        </div>
                        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                            <i class="fa fa-check-circle text-green-600 text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-bar-chart mr-2 text-blue-500"></i>今日推送状态分布
                    </h2>
                    <div class="space-y-3">
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-600">待购买</span>
                                <span id="dist-pending-buy" class="font-medium">0 (0%)</span>
                            </div>
                            <div class="h-3 bg-gray-100 rounded-full overflow-hidden">
                                <div id="bar-pending-buy" class="h-full bg-yellow-500 rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-600">待上传</span>
                                <span id="dist-pending-upload" class="font-medium">0 (0%)</span>
                            </div>
                            <div class="h-3 bg-gray-100 rounded-full overflow-hidden">
                                <div id="bar-pending-upload" class="h-full bg-red-500 rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-600">待审核</span>
                                <span id="dist-pending-review" class="font-medium">0 (0%)</span>
                            </div>
                            <div class="h-3 bg-gray-100 rounded-full overflow-hidden">
                                <div id="bar-pending-review" class="h-full bg-blue-500 rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-600">已完成</span>
                                <span id="dist-completed" class="font-medium">0 (0%)</span>
                            </div>
                            <div class="h-3 bg-gray-100 rounded-full overflow-hidden">
                                <div id="bar-completed" class="h-full bg-green-500 rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-600">已驳回</span>
                                <span id="dist-rejected" class="font-medium">0 (0%)</span>
                            </div>
                            <div class="h-3 bg-gray-100 rounded-full overflow-hidden">
                                <div id="bar-rejected" class="h-full bg-red-400 rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-bell mr-2 text-blue-500"></i>最近交易动态
                    </h2>
                    <div id="recent-trades" class="space-y-3">
                        <div class="text-center py-8 text-gray-500">
                            <i class="fa fa-exchange text-4xl mb-2 opacity-30"></i>
                            <p>暂无交易记录</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = '/api';

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function navigateTo(page) {
            if (page === 'dashboard') return;
            window.location.href = `${page}.html`;
        }

        function getToken() {
            return localStorage.getItem('admin_token');
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('admin_token');
                localStorage.removeItem('admin_user');
                window.location.href = 'index.html';
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString('zh-CN');
        }

        function getStatusText(status) {
            const texts = ['待购买', '待上传凭证', '审核中', '交易完成', '已驳回'];
            return texts[status] || '未知';
        }

        async function fetchStats() {
            try {
                const response = await fetch(`${API_BASE}/trade/today-stats`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) {
                    const stats = data.data;
                    document.getElementById('stat-total').textContent = stats.total || 0;
                    document.getElementById('stat-pending-buy').textContent = stats.pending_buy || 0;
                    document.getElementById('stat-pending-review').textContent = stats.pending_review || 0;
                    document.getElementById('stat-completed').textContent = stats.completed || 0;

                    const total = stats.total || 1;
                    updateDistribution('pending-buy', stats.pending_buy || 0, total);
                    updateDistribution('pending-upload', stats.pending_upload || 0, total);
                    updateDistribution('pending-review', stats.pending_review || 0, total);
                    updateDistribution('completed', stats.completed || 0, total);
                    updateDistribution('rejected', stats.rejected || 0, total);
                }
            } catch (error) {
                console.error('获取统计失败:', error);
            }
        }

        function updateDistribution(id, value, total) {
            const percent = total > 0 ? Math.round((value / total) * 100) : 0;
            document.getElementById(`dist-${id}`).textContent = `${value} (${percent}%)`;
            document.getElementById(`bar-${id}`).style.width = `${percent}%`;
        }

        async function fetchRecentTrades() {
            try {
                const response = await fetch(`${API_BASE}/trade/all?page=1&pageSize=5`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) {
                    renderRecentTrades(data.data.trades);
                }
            } catch (error) {
                console.error('获取交易失败:', error);
            }
        }

        function renderRecentTrades(trades) {
            const container = document.getElementById('recent-trades');
            if (!trades || trades.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fa fa-exchange text-4xl mb-2 opacity-30"></i>
                        <p>暂无交易记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = trades.map(trade => `
                <div class="flex items-center justify-between p-3 border-b border-gray-100 last:border-0">
                    <div>
                        <div class="font-medium text-gray-800">${trade.product_name || '产品'}</div>
                        <div class="text-xs text-gray-500">${trade.seller_name} → ${trade.buyer_name}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-blue-600 font-medium">${trade.price} 积分</div>
                        <div class="text-xs ${getStatusColor(trade.status)}">${getStatusText(trade.status)}</div>
                    </div>
                </div>
            `).join('');
        }

        function getStatusColor(status) {
            const colors = ['text-yellow-600', 'text-red-600', 'text-blue-600', 'text-green-600', 'text-red-500'];
            return colors[status] || 'text-gray-500';
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            fetchStats();
            fetchRecentTrades();
        });
    </script>
</body>
</html>
