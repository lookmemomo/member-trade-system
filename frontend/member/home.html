<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>会员积分交易站 - 交易中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f7fa;
        }
        .nav-item.active {
            color: #667eea;
        }
        .nav-item.active i {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-0 { background: #fef3c7; color: #d97706; }
        .status-1 { background: #fee2e2; color: #dc2626; }
        .status-2 { background: #dbeafe; color: #2563eb; }
        .status-3 { background: #dcfce7; color: #16a34a; }
        .status-4 { background: #fee2e2; color: #dc2626; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.2s ease;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transition: all 0.2s ease;
        }
        .btn-danger:active { transform: scale(0.98); }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .toast.show { opacity: 1; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .upload-area.has-file {
            border-style: solid;
            border-color: #667eea;
        }
    </style>
</head>
<body class="pb-20">
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="px-4 py-3 flex items-center justify-between">
            <h1 class="text-lg font-bold text-gray-800">会员积分交易站</h1>
            <div class="flex items-center space-x-3">
                <div class="text-right">
                    <div id="user-name" class="text-sm font-medium text-gray-700">用户</div>
                    <div id="user-level" class="text-xs text-gray-500">普通会员</div>
                </div>
            </div>
        </div>
        
        <div class="px-4 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-b-2xl">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm opacity-80">我的积分</span>
                <span id="total-points" class="text-xl font-bold">0</span>
            </div>
            <div class="flex space-x-4">
                <div class="flex-1 bg-white/20 rounded-lg p-2 text-center">
                    <div class="text-xs opacity-80">可用积分</div>
                    <div id="available-points" class="font-bold">0</div>
                </div>
                <div class="flex-1 bg-white/20 rounded-lg p-2 text-center">
                    <div class="text-xs opacity-80">冻结积分</div>
                    <div id="frozen-points" class="font-bold">0</div>
                </div>
            </div>
        </div>
    </header>

    <main class="p-4">
        <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
            <h2 class="font-semibold text-gray-800 mb-3 flex items-center">
                <i class="fa fa-shopping-cart mr-2 text-indigo-500"></i>今日交易
            </h2>
            <div id="trade-list" class="space-y-3">
                <div class="text-center py-8 text-gray-500">
                    <i class="fa fa-exchange text-4xl mb-2 opacity-30"></i>
                    <p>暂无今日交易</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-4">
            <h2 class="font-semibold text-gray-800 mb-3 flex items-center">
                <i class="fa fa-history mr-2 text-indigo-500"></i>交易历史
            </h2>
            <div id="history-list" class="space-y-3">
                <div class="text-center py-8 text-gray-500">
                    <i class="fa fa-history text-4xl mb-2 opacity-30"></i>
                    <p>暂无交易历史</p>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t border-gray-100">
        <div class="flex justify-around py-2">
            <div class="nav-item active flex flex-col items-center p-2" onclick="navigateTo('home')">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 mb-1">
                    <i class="fa fa-home text-gray-600"></i>
                </div>
                <span class="text-xs text-gray-600">交易</span>
            </div>
            <div class="nav-item flex flex-col items-center p-2" onclick="navigateTo('vouchers')">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 mb-1">
                    <i class="fa fa-image text-gray-600"></i>
                </div>
                <span class="text-xs text-gray-600">凭证</span>
            </div>
            <div class="nav-item flex flex-col items-center p-2" onclick="navigateTo('profile')">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 mb-1">
                    <i class="fa fa-user text-gray-600"></i>
                </div>
                <span class="text-xs text-gray-600">我的</span>
            </div>
        </div>
    </nav>

    <div id="toast" class="toast"></div>

    <div id="voucher-modal" class="modal-overlay">
        <div class="modal-content p-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">上传凭证</h3>
                <button onclick="closeModal('voucher-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <div id="upload-area" class="upload-area p-6 text-center cursor-pointer" onclick="document.getElementById('voucher-file').click()">
                <i class="fa fa-upload text-4xl text-gray-400 mb-2"></i>
                <p class="text-gray-500">点击或拖拽上传图片</p>
                <p class="text-xs text-gray-400 mt-1">支持jpg, jpeg, png，最大5MB</p>
            </div>
            <input type="file" id="voucher-file" accept="image/jpeg,image/png" class="hidden" onchange="handleVoucherSelect(this)">
            <div id="preview-container" class="hidden mt-4">
                <img id="voucher-preview" class="w-full rounded-lg" />
            </div>
            <button id="upload-btn" class="btn-primary w-full py-3 text-white rounded-lg font-medium mt-4 disabled:opacity-50" onclick="submitVoucher()" disabled>上传凭证</button>
        </div>
    </div>

    <div id="image-modal" class="modal-overlay" onclick="closeModal('image-modal')">
        <div class="modal-content p-0">
            <img id="full-image" class="w-full" />
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentTradeId = null;
        let selectedFile = null;
        let currentUserId = null;

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function navigateTo(page) {
            if (page === 'home') return;
            window.location.href = `${page}.html`;
        }

        function openModal(id) {
            document.getElementById(id).classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function getToken() {
            return localStorage.getItem('token');
        }

        function getStatusText(status) {
            const texts = ['待购买', '待上传凭证', '审核中', '交易完成', '已驳回'];
            return texts[status] || '未知';
        }

        async function fetchUserInfo() {
            try {
                const response = await fetch(`${API_BASE}/user/info`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) {
                    const user = data.data;
                    currentUserId = user.id;
                    document.getElementById('user-name').textContent = user.nickname || user.username;
                    document.getElementById('user-level').textContent = ['普通会员', '准店长', '店长'][user.level] || '普通会员';
                    document.getElementById('total-points').textContent = (user.points || 0) + (user.frozen_points || 0);
                    document.getElementById('available-points').textContent = user.points || 0;
                    document.getElementById('frozen-points').textContent = user.frozen_points || 0;
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
            }
        }

        async function fetchTodayTrades() {
            try {
                const response = await fetch(`${API_BASE}/trade/today`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) {
                    renderTradeList(data.data, 'trade-list');
                }
            } catch (error) {
                console.error('获取今日交易失败:', error);
            }
        }

        async function fetchHistoryTrades() {
            try {
                const response = await fetch(`${API_BASE}/trade/history?page=1&pageSize=10`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) {
                    renderTradeList(data.data.trades, 'history-list');
                }
            } catch (error) {
                console.error('获取交易历史失败:', error);
            }
        }

        function renderTradeList(trades, containerId) {
            const container = document.getElementById(containerId);
            if (!trades || trades.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fa fa-exchange text-4xl mb-2 opacity-30"></i>
                        <p>暂无交易记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = trades.map(trade => `
                <div class="border border-gray-100 rounded-lg p-3">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <div class="font-medium text-gray-800">${trade.product_name || '产品'}</div>
                            <div class="text-xs text-gray-500">卖家: ${trade.seller_name || '-'}</div>
                        </div>
                        <span class="status-badge status-${trade.status}">${getStatusText(trade.status)}</span>
                    </div>
                    
                    ${trade.seller_qrcode ? `
                        <div class="mb-3">
                            <div class="text-xs text-gray-500 mb-1">卖家交易码</div>
                            <img src="${trade.seller_qrcode}" class="w-24 h-24 rounded-lg" onclick="showFullImage('${trade.seller_qrcode}')" />
                        </div>
                    ` : ''}

                    <div class="flex justify-between items-center">
                        <div class="${trade.buyer_id === currentUserId ? 'text-red-600' : 'text-green-600'} font-bold">${trade.buyer_id === currentUserId ? '-' : '+'}${trade.price} 积分</div>
                        <div>
                            ${trade.status === 0 ? `
                                <button class="btn-primary text-white px-4 py-2 rounded-lg text-sm font-medium" onclick="buyProduct(${trade.id})">立即购买</button>
                            ` : trade.status === 1 ? `
                                <button class="btn-danger text-white px-4 py-2 rounded-lg text-sm font-medium" onclick="openVoucherModal(${trade.id})">上传凭证</button>
                            ` : trade.status === 4 ? `
                                <span class="text-xs text-gray-500" title="${trade.review_remark}">点击查看原因</span>
                            ` : trade.status === 3 ? `
                                <button class="text-indigo-600 text-sm" onclick="showTradeDetail(${trade.id})">查看详情</button>
                            ` : `
                                <span class="text-gray-400 text-sm">审核中...</span>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function buyProduct(tradeId) {
            try {
                const response = await fetch(`${API_BASE}/trade/${tradeId}/buy`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) {
                    showToast(data.message);
                    fetchTodayTrades();
                    fetchUserInfo();
                } else {
                    showToast(data.message);
                }
            } catch (error) {
                showToast('购买失败，请稍后重试');
            }
        }

        function openVoucherModal(tradeId) {
            currentTradeId = tradeId;
            selectedFile = null;
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('upload-area').classList.remove('has-file');
            document.getElementById('upload-btn').disabled = true;
            document.getElementById('voucher-file').value = '';
            openModal('voucher-modal');
        }

        function handleVoucherSelect(input) {
            const file = input.files[0];
            if (!file) return;

            const maxSize = 5 * 1024 * 1024;
            if (file.size > maxSize) {
                showToast('图片大小不能超过5MB');
                return;
            }

            selectedFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('voucher-preview').src = e.target.result;
                document.getElementById('preview-container').classList.remove('hidden');
                document.getElementById('upload-area').classList.add('has-file');
                document.getElementById('upload-btn').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        async function submitVoucher() {
            if (!selectedFile || !currentTradeId) return;

            const formData = new FormData();
            formData.append('image', selectedFile);

            try {
                const response = await fetch(`${API_BASE}/trade/${currentTradeId}/upload-voucher`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}` },
                    body: formData
                });
                const data = await response.json();
                if (data.code === 200) {
                    showToast('上传成功');
                    closeModal('voucher-modal');
                    fetchTodayTrades();
                } else {
                    showToast(data.message);
                }
            } catch (error) {
                showToast('上传失败，请稍后重试');
            }
        }

        function showFullImage(url) {
            document.getElementById('full-image').src = url;
            openModal('image-modal');
        }

        function showTradeDetail(tradeId) {
            showToast('交易完成');
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchUserInfo();
            fetchTodayTrades();
            fetchHistoryTrades();
        });
    </script>
</body>
</html>
