<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>会员积分交易站 - 我的凭证</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f7fa;
        }
        .nav-item.active { color: #667eea; }
        .nav-item.active i {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-0 { background: #fef3c7; color: #d97706; }
        .status-1 { background: #fee2e2; color: #dc2626; }
        .status-2 { background: #dbeafe; color: #2563eb; }
        .status-3 { background: #dcfce7; color: #16a34a; }
        .status-4 { background: #fee2e2; color: #dc2626; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body class="pb-20">
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="px-4 py-3 flex items-center">
            <button onclick="window.location.href='home.html'" class="mr-3 text-gray-600">
                <i class="fa fa-arrow-left"></i>
            </button>
            <h1 class="text-lg font-bold text-gray-800">我的凭证</h1>
        </div>
    </header>

    <main class="p-4">
        <div id="voucher-list" class="space-y-3">
            <div class="text-center py-8 text-gray-500">
                <i class="fa fa-image text-4xl mb-2 opacity-30"></i>
                <p>暂无凭证记录</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t border-gray-100">
        <div class="flex justify-around py-2">
            <div class="nav-item flex flex-col items-center p-2" onclick="navigateTo('home')">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 mb-1">
                    <i class="fa fa-home text-gray-600"></i>
                </div>
                <span class="text-xs text-gray-600">交易</span>
            </div>
            <div class="nav-item active flex flex-col items-center p-2" onclick="navigateTo('vouchers')">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 mb-1">
                    <i class="fa fa-image text-gray-600"></i>
                </div>
                <span class="text-xs text-gray-600">凭证</span>
            </div>
            <div class="nav-item flex flex-col items-center p-2" onclick="navigateTo('profile')">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 mb-1">
                    <i class="fa fa-user text-gray-600"></i>
                </div>
                <span class="text-xs text-gray-600">我的</span>
            </div>
        </div>
    </nav>

    <div id="image-modal" class="modal-overlay" onclick="closeModal('image-modal')">
        <div class="modal-content p-0">
            <img id="full-image" class="w-full" />
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function navigateTo(page) {
            window.location.href = `${page}.html`;
        }

        function openModal(id) {
            document.getElementById(id).classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function getToken() {
            return localStorage.getItem('token');
        }

        function getStatusText(status) {
            const texts = ['待购买', '待上传凭证', '审核中', '交易完成', '已驳回'];
            return texts[status] || '未知';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString('zh-CN');
        }

        async function fetchVouchers() {
            try {
                const response = await fetch(`${API_BASE}/trade/vouchers?page=1&pageSize=20`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) {
                    renderVoucherList(data.data.vouchers);
                }
            } catch (error) {
                console.error('获取凭证失败:', error);
            }
        }

        function renderVoucherList(vouchers) {
            const container = document.getElementById('voucher-list');
            if (!vouchers || vouchers.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fa fa-image text-4xl mb-2 opacity-30"></i>
                        <p>暂无凭证记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = vouchers.map(voucher => `
                <div class="bg-white rounded-xl shadow-sm p-4">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="font-medium text-gray-800">${voucher.product_name || '产品'}</div>
                            <div class="text-xs text-gray-500">价格: ${voucher.price} 积分</div>
                        </div>
                        <span class="status-badge status-${voucher.status}">${getStatusText(voucher.status)}</span>
                    </div>
                    
                    <div class="mb-3">
                        <div class="text-xs text-gray-500 mb-1">上传截图</div>
                        <img src="${voucher.voucher_image_url}" class="w-full max-h-64 object-contain rounded-lg bg-gray-100" onclick="showFullImage('${voucher.voucher_image_url}')" />
                    </div>

                    <div class="flex justify-between text-xs text-gray-500">
                        <span>上传时间: ${formatDate(voucher.voucher_upload_time)}</span>
                        ${voucher.review_time ? `<span>审核时间: ${formatDate(voucher.review_time)}</span>` : ''}
                    </div>

                    ${voucher.review_remark ? `
                        <div class="mt-2 p-2 bg-red-50 rounded-lg">
                            <div class="text-xs text-red-600 font-medium">驳回原因</div>
                            <div class="text-sm text-red-500">${voucher.review_remark}</div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function showFullImage(url) {
            document.getElementById('full-image').src = url;
            openModal('image-modal');
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchVouchers();
        });
    </script>
</body>
</html>
