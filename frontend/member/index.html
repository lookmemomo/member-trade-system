<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>会员积分交易站 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .tab-active {
            border-bottom: 2px solid #667eea;
            color: #667eea;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 p-6 text-center">
            <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa fa-exchange text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">会员积分交易站</h1>
            <p class="text-white/80 text-sm mt-2">积分流转 · 安全可靠</p>
        </div>

        <div class="p-6">
            <div class="flex border-b border-gray-200 mb-6">
                <div class="flex-1 text-center py-3 cursor-pointer font-medium tab-active" id="tab-login" onclick="switchTab('login')">登录</div>
                <div class="flex-1 text-center py-3 cursor-pointer font-medium text-gray-500" id="tab-register" onclick="switchTab('register')">注册</div>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                    <input type="tel" id="login-username" class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg" placeholder="请输入手机号">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="login-password" class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg" placeholder="请输入密码">
                </div>
                <button type="submit" class="btn-primary w-full py-3 text-white rounded-lg font-medium">登 录</button>
            </form>

            <form id="register-form" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名 <span class="text-red-500">*</span></label>
                    <input type="text" id="reg-username" class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg" placeholder="请输入用户名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码 <span class="text-red-500">*</span></label>
                    <input type="password" id="reg-password" class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg" placeholder="请输入密码">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">手机号 <span class="text-red-500">*</span></label>
                    <input type="tel" id="reg-mobile" class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg" placeholder="请输入11位手机号">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">昵称（选填）</label>
                    <input type="text" id="reg-nickname" class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg" placeholder="请输入昵称">
                </div>
                <button type="submit" class="btn-primary w-full py-3 text-white rounded-lg font-medium">注 册</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = '/api';

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function switchTab(tab) {
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            if (tab === 'login') {
                loginTab.classList.add('tab-active');
                registerTab.classList.remove('tab-active');
                loginTab.classList.remove('text-gray-500');
                registerTab.classList.add('text-gray-500');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                registerTab.classList.add('tab-active');
                loginTab.classList.remove('tab-active');
                registerTab.classList.remove('text-gray-500');
                loginTab.classList.add('text-gray-500');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                showToast('请填写完整信息');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                
                if (data.code === 200) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    showToast('登录成功');
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 1000);
                } else {
                    showToast(data.message);
                }
            } catch (error) {
                showToast('网络错误，请稍后重试');
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const mobile = document.getElementById('reg-mobile').value.trim();
            const nickname = document.getElementById('reg-nickname').value.trim();

            if (!username) {
                showToast('请输入用户名');
                return;
            }
            if (!password) {
                showToast('请输入密码');
                return;
            }
            if (!mobile) {
                showToast('请输入手机号');
                return;
            }
            if (!/^1[3-9]\d{9}$/.test(mobile)) {
                showToast('请输入正确的11位手机号');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, mobile, email: '', nickname })
                });
                const data = await response.json();
                
                if (data.code === 200) {
                    showToast('注册成功，请登录');
                    switchTab('login');
                    document.getElementById('login-username').value = mobile;
                } else {
                    showToast(data.message);
                }
            } catch (error) {
                showToast('网络错误，请稍后重试');
            }
        });
    </script>
</body>
</html>
