<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>会员积分交易站 - 个人中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f7fa;
        }
        .nav-item.active { color: #667eea; }
        .nav-item.active i {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .toast.show { opacity: 1; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            display: none;
            align-items: flex-end;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
    </style>
</head>
<body class="pb-20">
    <header class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white">
        <div class="px-4 py-6">
            <div class="flex items-center space-x-4">
                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fa fa-user text-white text-2xl"></i>
                </div>
                <div>
                    <div id="user-name" class="text-xl font-bold">用户</div>
                    <div id="user-id" class="text-sm opacity-80">ID: -</div>
                </div>
            </div>
        </div>

        <div class="px-4 pb-6">
            <div class="bg-white/10 rounded-xl p-4">
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div>
                        <div id="available-points" class="text-xl font-bold">0</div>
                        <div class="text-xs opacity-80">可用积分</div>
                    </div>
                    <div>
                        <div id="frozen-points" class="text-xl font-bold">0</div>
                        <div class="text-xs opacity-80">冻结积分</div>
                    </div>
                    <div>
                        <div id="reward-value" class="text-xl font-bold">0</div>
                        <div class="text-xs opacity-80">奖励值</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="p-4 -mt-4">
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="p-4 border-b border-gray-100">
                <h2 class="font-semibold text-gray-800 flex items-center">
                    <i class="fa fa-info-circle mr-2 text-indigo-500"></i>基本信息
                </h2>
            </div>
            <div class="divide-y divide-gray-100">
                <div class="p-4 flex justify-between items-center">
                    <span class="text-gray-600">昵称</span>
                    <span id="profile-nickname" class="text-gray-800 font-medium">-</span>
                </div>
                <div class="p-4 flex justify-between items-center">
                    <span class="text-gray-600">会员等级</span>
                    <span id="profile-level" class="text-gray-800 font-medium">-</span>
                </div>
                <div class="p-4 flex justify-between items-center">
                    <span class="text-gray-600">推荐人</span>
                    <span id="profile-referrer" class="text-gray-800 font-medium">-</span>
                </div>
                <div class="p-4 flex justify-between items-center">
                    <span class="text-gray-600">注册时间</span>
                    <span id="profile-date" class="text-gray-800 font-medium">-</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden mt-4">
            <div class="p-4 border-b border-gray-100">
                <h2 class="font-semibold text-gray-800 flex items-center">
                    <i class="fa fa-qrcode mr-2 text-indigo-500"></i>交易二维码
                </h2>
            </div>
            <div class="p-4">
                <div id="qrcode-container" class="flex flex-col items-center">
                    <div id="qrcode-placeholder" class="w-40 h-40 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center text-gray-400">
                        <div class="text-center">
                            <i class="fa fa-qrcode text-3xl mb-1"></i>
                            <p class="text-xs">点击上传</p>
                        </div>
                    </div>
                    <img id="qrcode-image" class="w-40 h-40 rounded-lg hidden" />
                    <button onclick="openUploadModal()" class="mt-3 btn-primary text-white px-4 py-2 rounded-lg text-sm font-medium">
                        上传/更换二维码
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden mt-4">
            <div class="p-4 border-b border-gray-100">
                <h2 class="font-semibold text-gray-800 flex items-center">
                    <i class="fa fa-gift mr-2 text-indigo-500"></i>持有产品
                </h2>
            </div>
            <div class="p-4">
                <div id="product-container" class="text-center">
                    <div class="text-gray-500">
                        <i class="fa fa-gift text-4xl mb-2 opacity-30"></i>
                        <p>暂无持有产品</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden mt-4">
            <div class="divide-y divide-gray-100">
                <div class="p-4 flex justify-between items-center cursor-pointer" onclick="navigateTo('home')">
                    <span class="text-gray-600 flex items-center">
                        <i class="fa fa-history mr-3 text-gray-400"></i>交易记录
                    </span>
                    <i class="fa fa-chevron-right text-gray-400"></i>
                </div>
                <div class="p-4 flex justify-between items-center cursor-pointer" onclick="navigateTo('vouchers')">
                    <span class="text-gray-600 flex items-center">
                        <i class="fa fa-image mr-3 text-gray-400"></i>我的凭证
                    </span>
                    <i class="fa fa-chevron-right text-gray-400"></i>
                </div>
                <div class="p-4 flex justify-between items-center cursor-pointer text-red-500" onclick="logout()">
                    <span class="flex items-center">
                        <i class="fa fa-sign-out mr-3"></i>退出登录
                    </span>
                    <i class="fa fa-chevron-right"></i>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t border-gray-100">
        <div class="flex justify-around py-2">
            <div class="nav-item flex flex-col items-center p-2" onclick="navigateTo('home')">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 mb-1">
                    <i class="fa fa-home text-gray-600"></i>
                </div>
                <span class="text-xs text-gray-600">交易</span>
            </div>
            <div class="nav-item flex flex-col items-center p-2" onclick="navigateTo('vouchers')">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 mb-1">
                    <i class="fa fa-image text-gray-600"></i>
                </div>
                <span class="text-xs text-gray-600">凭证</span>
            </div>
            <div class="nav-item active flex flex-col items-center p-2" onclick="navigateTo('profile')">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 mb-1">
                    <i class="fa fa-user text-gray-600"></i>
                </div>
                <span class="text-xs text-gray-600">我的</span>
            </div>
        </div>
    </nav>

    <div id="toast" class="toast"></div>

    <div id="upload-modal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">上传交易二维码</h3>
                <button onclick="closeModal('upload-modal')" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <div id="qrcode-upload-area" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer" onclick="document.getElementById('qrcode-file').click()">
                <i class="fa fa-upload text-4xl text-gray-400 mb-2"></i>
                <p class="text-gray-500">点击上传二维码</p>
                <p class="text-xs text-gray-400 mt-1">支持jpg, jpeg, png，最大5MB</p>
            </div>
            <input type="file" id="qrcode-file" accept="image/jpeg,image/png" class="hidden" onchange="handleQrcodeSelect(this)">
            <div id="qrcode-preview-container" class="hidden mt-4">
                <img id="qrcode-preview" class="w-full rounded-lg" />
            </div>
            <button id="submit-qrcode-btn" class="btn-primary w-full py-3 text-white rounded-lg font-medium mt-4 disabled:opacity-50" onclick="submitQrcode()" disabled>确认上传</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let selectedQrcodeFile = null;

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function navigateTo(page) {
            window.location.href = `${page}.html`;
        }

        function openModal(id) {
            document.getElementById(id).classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function getToken() {
            return localStorage.getItem('token');
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('zh-CN');
        }

        async function fetchUserInfo() {
            try {
                const response = await fetch(`${API_BASE}/user/info`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200) {
                    const user = data.data;
                    document.getElementById('user-name').textContent = user.nickname || user.username;
                    document.getElementById('user-id').textContent = `ID: ${user.id}`;
                    document.getElementById('available-points').textContent = user.points || 0;
                    document.getElementById('frozen-points').textContent = user.frozen_points || 0;
                    document.getElementById('reward-value').textContent = user.reward_value || 0;
                    document.getElementById('profile-nickname').textContent = user.nickname || '-';
                    document.getElementById('profile-level').textContent = ['普通会员', '准店长', '店长'][user.level] || '普通会员';
                    document.getElementById('profile-referrer').textContent = user.referrer_name || '-';
                    document.getElementById('profile-date').textContent = formatDate(user.created_at);

                    if (user.qrcode_url) {
                        document.getElementById('qrcode-placeholder').classList.add('hidden');
                        document.getElementById('qrcode-image').src = `${user.qrcode_url}`;
                        document.getElementById('qrcode-image').classList.remove('hidden');
                    }

                    fetchProduct(user.id);
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
            }
        }

        async function fetchProduct(userId) {
            try {
                const response = await fetch(`${API_BASE}/member/${userId}/product`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.code === 200 && data.data) {
                    const product = data.data;
                    document.getElementById('product-container').innerHTML = `
                        <div class="border border-gray-100 rounded-lg p-4">
                            <div class="font-medium text-gray-800">${product.name}</div>
                            <div class="text-sm text-gray-500">${product.description || '-'}</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('获取产品失败:', error);
            }
        }

        function openUploadModal() {
            selectedQrcodeFile = null;
            document.getElementById('qrcode-preview-container').classList.add('hidden');
            document.getElementById('submit-qrcode-btn').disabled = true;
            document.getElementById('qrcode-file').value = '';
            openModal('upload-modal');
        }

        function handleQrcodeSelect(input) {
            const file = input.files[0];
            if (!file) return;

            const maxSize = 5 * 1024 * 1024;
            if (file.size > maxSize) {
                showToast('图片大小不能超过5MB');
                return;
            }

            selectedQrcodeFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('qrcode-preview').src = e.target.result;
                document.getElementById('qrcode-preview-container').classList.remove('hidden');
                document.getElementById('submit-qrcode-btn').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        async function submitQrcode() {
            if (!selectedQrcodeFile) return;

            const formData = new FormData();
            formData.append('image', selectedQrcodeFile);

            try {
                const response = await fetch(`${API_BASE}/upload/qrcode`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}` },
                    body: formData
                });
                const data = await response.json();
                if (data.code === 200) {
                    await fetch(`${API_BASE}/user/info`, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `Bearer ${getToken()}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ qrcode_url: data.data.imageUrl })
                    });
                    showToast('上传成功');
                    closeModal('upload-modal');
                    fetchUserInfo();
                } else {
                    showToast(data.message);
                }
            } catch (error) {
                showToast('上传失败，请稍后重试');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchUserInfo();
        });
    </script>
</body>
</html>
